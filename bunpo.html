<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N2文法助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>">

    <style>
        :root {
            --main-pink: #ffccd5;          
            --main-yellow: #fff4d4;        
            --main-green: #d8f3dc;         
            --main-blue: #bce3f7;          
            --main-purple: #e2d1f9;        
            --border-purple: #7d6b91;          
            --text-darkpurple: #4a3e56;        
            --inner-purple: #ecd5fa;           
            --bg-lightpurple: #d1dcff;         
            --ingame-bg-grey: #eaeaef;         
            --ingame-inner-grey: #d5d4e6;      
            --container-shadow-mask: rgba(93, 77, 112, 0.25); 
            --inner-scrollbar-track: rgba(0,0,0,0.1);          
            --setup-box-bg: rgba(255,255,255,0.4);            
            --spelling-box-bg: rgba(255,255,255,0.6);         
            --text-glow-color: #fff;            
            --pure-white: #fff;                 
            --btn-gray: #e2e2e2;                
            --warn-color: #e67e22;              
            --success-color: #46b450;
            --error-color: #e74c3c;
            --blue-primary: #0073aa;
            --text-glow: 1px 1px 0px var(--text-glow-color); 
            --card-padding: 25px 15px;
        }
        
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        .flex-col-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .flex-row-center { display: flex; flex-direction: row; align-items: center; justify-content: center; }
        
        body {
            margin: 0; padding: 20px 15px; min-height: 100vh; background-color: var(--bg-lightpurple);
            background-image:
                linear-gradient(45deg, var(--main-purple) 25%, transparent 25%, transparent 75%, var(--main-purple) 75%, var(--main-purple)),
                linear-gradient(45deg, var(--main-purple) 25%, transparent 25%, transparent 75%, var(--main-purple) 75%, var(--main-purple));
            background-size: 120px 120px; background-position: 0 0, 60px 60px;
            font-family: 'Segoe UI', "Microsoft YaHei", monospace;
            transition: background 0.3s ease;
            display: flex; justify-content: center; align-items: center;
        }
        
        body.in-game-mode:not(.game-over) { background-image: none !important; background-color: var(--ingame-bg-grey) !important; }
        body.in-game-mode:not(.game-over) #main-container,
        body.in-game-mode:not(.game-over) .inner-wrap { background: var(--ingame-inner-grey) !important; }
        
        #main-container {
            width: 100%; max-width: 500px; min-height: 540px; text-align: center;
            max-height: calc(100vh - 40px);
            background: linear-gradient(135deg, var(--main-pink), var(--main-yellow), var(--main-green), var(--main-blue), var(--main-purple), var(--main-pink));
            border: 2px solid var(--border-purple); border-radius: 40px; padding: 16px;
            box-shadow: 0 12px var(--border-purple) var(--container-shadow-mask);
            transition: zoom 0.15s ease, background 0.3s ease, transform 0.15s ease;
            display: flex; flex-direction: column;
        }
        
        #main-container.setup-scaled { zoom: 0.8; }
        
        .inner-wrap { 
            background-color: var(--inner-purple); border-radius: 28px; padding: var(--card-padding); 
            width: 100%; min-height: 490px; flex: 1; transition: background 0.3s ease;
            display: flex; flex-direction: column; justify-content: center; 
            overflow: hidden;
        }
        
        h3, #result-area h2 { color: var(--text-darkpurple); margin: 0 0 20px 0; font-size: 24px; text-shadow: var(--text-glow); text-align: center; width: 100%; }
        .hidden { display: none !important; }
        
        .setup-box { border: 2px dashed var(--border-purple); padding: 25px 20px; border-radius: 20px; background: var(--setup-box-bg); width: 100%; }
        
        .icon-heart { display: inline-block; width: 18px; height: 18px; vertical-align: middle; margin-right: 6px; background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>"); background-size: contain; background-repeat: no-repeat; }
        .theme-hint-text { color: var(--border-purple); font-size: 0.85em; font-weight: bold; text-align: center; width: 100%; margin: 0 0 12px 0; }
        
        .txt-spec-hint { font-size: 0.8em; line-height: 1.4; text-align: left; }
        
        .btn-base { 
            padding: 12px 16px; 
            color: var(--text-darkpurple); 
            border: 2px solid var(--border-purple); 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 0px var(--border-purple); 
            position: relative; 
            top: 0; 
            outline: none; 
            gap: 8px; 
            transition: all 0.05s ease; 
        }
        .btn-base:active { top: 4px; box-shadow: 0 0px 0px var(--border-purple); }
        
        .load-txt-btn { background-color: var(--main-blue); width: 100%; margin: 12px 0 0 0; }
        .unified-btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; margin-top: 15px; }
        
        .major-hub-btn { width: 85%; max-width: 300px; justify-content: center; }
        .major-btn-study { background-color: var(--main-pink); }
        .major-btn-challenge { background-color: var(--main-blue); }
        .major-btn-write { background-color: var(--main-purple); }
        .major-btn-match { background-color: var(--main-yellow); }
        
        .local-import-btn { background-color: var(--main-yellow); width: 100%; margin: 5px; }
        
        .divider-box { margin-top: 15px; border-top: 2px dashed var(--border-purple); padding-top: 15px; width: 100%; }
        
        /* 题目范围卡片样式 */
        .card { 
            border: none; border-radius: 18px; padding: 15px; 
            background: var(--pure-white); text-align: left; margin: 10px 0; 
            height: 120px; overflow-y: auto; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .card::-webkit-scrollbar { width: 4px; }
        .card::-webkit-scrollbar-thumb { background: var(--inner-scrollbar-track); border-radius: 10px; }

        .card.study-mode-card {
            background: var(--pure-white) !important;
            border: 2px solid var(--border-purple);
            border-radius: 18px;
            height: 120px !important;
            margin: 10px 0;
        }

        /* 日文题目样式 - 已紧凑化 */
        .sentence-display { font-size: 1.2em; line-height: 1.2; color: var(--text-darkpurple); margin-bottom: 2px; font-weight: 575; text-align: center; }
        
        /* 中文解释样式与进度条样式统一 - 已紧凑化 */
        .translation-display, .purple-progress-hint { font-size: 0.85em; line-height: 1.2; color: var(--border-purple); font-style: normal; font-weight: bold; opacity: 1; display: block; text-align: center; margin-bottom: 8px; }
        
        #display-grammar { font-size: 1.2em; line-height: 1.2; color: var(--text-darkpurple); margin-bottom: 8px; font-weight: 575; text-align: center; }
        
        .spelling-box { 
            padding: 12px 15px; 
            background: var(--spelling-box-bg); 
            border-radius: 16px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            margin: 6px 0 0 0; 
        }
        .spelling-box label { font-size: 0.85em; color: var(--border-purple); display: block; font-weight: bold; text-align: center; }
        
        input[type="text"].readonly-clickable-input { 
            width: 100%; padding: 12px; font-size: 1.2em; font-weight: 575; 
            border: 2px solid var(--border-purple); border-radius: 12px; 
            text-align: center; outline: none; background: var(--pure-white); 
            color: var(--border-purple); cursor: pointer; caret-color: transparent;
        }
        input[type="text"].readonly-clickable-input::placeholder { color: #b5afbe; opacity: 0.8; font-weight: normal; }
        
        .scramble-container { 
            display: grid; 
            grid-template-rows: repeat(3, auto); 
            grid-auto-flow: column; 
            grid-auto-columns: minmax(0, 1fr); 
            gap: 6px; 
            min-height: 130px; 
            width: 100%; 
            justify-content: center; 
            margin: 6px 0 0 0; 
        }
        .char-tile { 
            background: var(--pure-white); border: 2px solid var(--border-purple); color: var(--border-purple); 
            border-radius: 12px; width: 42px; height: 42px; line-height: 38px; 
            font-size: 1.2em; font-weight: 575; cursor: pointer; user-select: none; text-align: center; transition: all 0.15s; 
        }
        .char-tile:active { border-width: 1px; transform: scale(1.05); background: var(--main-purple); }
        .char-tile.used { opacity: 0.4; background: var(--ingame-bg-grey); pointer-events: none; }
        .char-tile.correct-hidden { visibility: hidden; pointer-events: none; }
        
        /* 完全同步 dl3 数字输入框的所有排版样式 */
        #numFileInput { 
            text-align: center; 
            font-size: 18px; 
            letter-spacing: 4px; 
            max-width: 200px; 
            margin: 0 auto; 
            display: block; 
            border: 2px solid var(--border-purple); 
            border-radius: 12px; 
            color: var(--border-purple); 
            background: var(--pure-white);
            padding: 12px;
            font-weight: 575;
            outline: none;
        }
        
        .numpad-wrap { margin-top: 15px; margin-bottom: 12px; width: 100%; display: flex; flex-direction: column; gap: 6px; }
        .numpad-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
        .num-key { width: 60px; height: 60px; font-size: 22px; padding: 0; margin: 0; background: var(--pure-white); color: var(--text-darkpurple); border: 2px solid var(--border-purple); border-radius: 12px; box-shadow: none; font-weight: bold; }
        .num-key:active { border-width: 1px; transform: scale(1.05); }
        .num-key.func { background: var(--main-purple); }
        
        #setup-area, #mode-area, #sentence-area { display: flex; flex-direction: column; height: 100%; justify-content: center; }
        #setsuzoku-area { display: flex; flex-direction: column; height: 100%; }
        .setsuzoku-content-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 2px; }
        
        /* 接续模式：重构为严格、整齐的三列网格布局，并固定容器总高度 */
        /* 调整 margin-top 使题目框到方块的距离和题目框到进度提示的距离一致 (10px) */
        .options-grid { 
            width: 100%; 
            height: 252px; 
            min-height: 252px;
            max-height: 252px;
            overflow-y: auto; 
            padding-right: 4px;
            margin-top: 10px;
            margin-bottom: 4px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            align-content: start;
        }
        .options-grid::-webkit-scrollbar { width: 4px; }
        .options-grid::-webkit-scrollbar-thumb { background: var(--inner-scrollbar-track); border-radius: 10px; }
        
        .setsuzoku-bottom-btns { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; margin-top: auto; }
        
        .num-input-box { width: 100%; }
        
        .action-row-btns { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        
        /* 统一所有灰色按钮 */
        .btn-prev, .btn-next { flex: 1; background: var(--btn-gray); justify-content: center; border-radius: 18px; margin: 0; }
        
        .btn-back-menu, .btn-hint { background: var(--btn-gray); width: 100%; margin-top: 10px; justify-content: center; }
        .btn-back-menu { padding: 12px 16px; border-radius: 18px; margin: 10px 0 0 0; }
        
        .btn-peek-ans { background: var(--btn-gray); width: 100%; margin-top: 6px; margin-bottom: 12px; font-size: 16px; padding: 12px 16px; border-radius: 18px; justify-content: center; }
        .btn-back-menu-small { background: var(--btn-gray); width: 100%; font-size: 16px; padding: 12px 16px; border-radius: 18px; justify-content: center; }
        
        .hard-points-wrapper { width: 100%; }
        .hard-points-title { font-weight: bold; color: var(--warn-color); margin-bottom: 5px; }
        .result-title-text { color: var(--text-darkpurple); }
        
        /* 选项方块：适配 Grid 布局，去除了旧样式的不定外边距，使用弹性盒实现文本居中和长文本换行 */
        .opt-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; min-height: 42px; padding: 4px 6px; margin: 0;
            border: 2px solid var(--border-purple); border-radius: 12px;
            background: var(--pure-white); color: var(--text-darkpurple);
            font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.1s;
            word-break: break-all; text-align: center; line-height: 1.2;
        }
        .opt-btn.study-hint { background: var(--main-yellow); }
        .opt-btn.correct { background: var(--main-purple); color: var(--text-darkpurple); }
        .opt-btn.wrong { background: var(--main-pink); }
        
        @media (max-width: 480px) {
            #main-container { padding: 10px; }
            #main-container.setup-scaled { transform: none !important; margin-bottom: 0 !important; zoom: 0.8; }
            .inner-wrap { padding: 15px 10px; }
            .char-tile { width: 36px; height: 36px; line-height: 32px; font-size: 1.05em; border-radius: 9px; }
            .num-key { width: 50px; height: 50px; font-size: 18px; }
            .card.study-mode-card, .card { height: 120px !important; margin: 10px 0; }
            .options-grid { height: 252px; min-height: 252px; max-height: 252px; gap: 5px; margin-top: 10px; }
            .opt-btn { font-size: 12px; min-height: 40px; }
        }
    </style>
</head>
<body>

<div id="main-container" class="setup-scaled">
    <div class="inner-wrap">
        <!-- 1. 文件加载初始区 -->
        <div id="setup-area" class="flex-col-center" style="width:100%">
            <h3>N2文法助手</h3>
            <div class="setup-box flex-col-center">
                <p class="theme-hint-text flex-row-center">
                    <span class="icon-heart" style="width:14px; height:14px;"></span>
                    <span>输入数字加载 BunpoTxt/数字.txt</span>
                </p>
                <div class="num-input-box">
                    <input type="text" id="numFileInput" readonly placeholder="...">
                </div>
                <div class="numpad-wrap">
                    <div class="numpad-row flex-row-center">
                        <button class="num-key" data-val="1">1</button>
                        <button class="num-key" data-val="2">2</button>
                        <button class="num-key" data-val="3">3</button>
                    </div>
                    <div class="numpad-row flex-row-center">
                        <button class="num-key" data-val="4">4</button>
                        <button class="num-key" data-val="5">5</button>
                        <button class="num-key" data-val="6">6</button>
                    </div>
                    <div class="numpad-row flex-row-center">
                        <button class="num-key" data-val="7">7</button>
                        <button class="num-key" data-val="8">8</button>
                        <button class="num-key" data-val="9">9</button>
                    </div>
                    <div class="numpad-row flex-row-center">
                        <button class="num-key func" data-val="clear">AC</button>
                        <button class="num-key" data-val="0">0</button>
                        <button class="num-key func" data-val="del">&larr;</button>
                    </div>
                </div>
                <button class="btn-base load-txt-btn flex-row-center" id="fetchBunpoTxtBtn">加载文法库</button>
                <div class="divider-box flex-col-center" style="width:100%">
                    <p class="theme-hint-text flex-row-center txt-spec-hint">
                        <span>TXT格式规范：<br>
                        上方：句子填空行（句子,翻译,原形,答案）<br>
                        分隔行：五分针拼接符<br>
                        下方：接续变形行（文法,词性_接续...）</span>
                    </p>
                    <label for="fileInput" class="btn-base flex-row-center local-import-btn" style="justify-content: center;">汇入本地文件</label>
                    <input type="file" id="fileInput" accept=".txt" class="hidden">
                </div>
            </div>
        </div>

        <!-- 2. 主菜单 -->
        <div id="mode-area" class="hidden">
            <h3>句子：<span id="sentence-count">0</span> | 接续：<span id="setsuzoku-count">0</span></h3>
            <div class="unified-btn-container">
                <button class="btn-base major-hub-btn major-btn-study flex-row-center" onclick="startMode('sentence-study')">句子填空-学习模式</button>
                <button class="btn-base major-hub-btn major-btn-challenge flex-row-center" onclick="startMode('sentence-challenge')">句子填空-挑战模式</button>
                <button class="btn-base major-hub-btn major-btn-write flex-row-center" onclick="startMode('setsuzoku-study')">接续变形-学习模式</button>
                <button class="btn-base major-hub-btn major-btn-match flex-row-center" onclick="startMode('setsuzoku-challenge')">接续变形-测试模式</button>
            </div>
        </div>

        <!-- 3. 句子填空练习区域 -->
        <div id="sentence-area" class="hidden">
            <div class="purple-progress-hint">填空练习: <span id="sentence-progress">0</span> / <span id="sentence-total">0</span></div>
            <div class="card" id="sentence-card-content"></div>
            
            <div class="spelling-box">
                <label>语法填空 (输入答案或点击字块)</label>
                <input type="text" id="sentenceAnswerInput" class="readonly-clickable-input" placeholder="" readonly autocomplete="off" onclick="resetSentenceInput()">
                <div id="sentence-scramble-zone" class="scramble-container"></div>
            </div>
            
            <div class="action-row-btns" id="sentence-nav-row">
                <button class="btn-base btn-prev flex-row-center" onclick="prevSentenceCard()">上一条</button>
                <button class="btn-base btn-next flex-row-center" onclick="nextSentenceCard()">下一条</button>
            </div>
            <button id="sentence-hint-btn" class="btn-base btn-hint flex-row-center" onclick="showSentenceAnswer()">查看答案</button>
            <button class="btn-base btn-back-menu flex-row-center" onclick="switchView('mode-area')">返回菜单</button>
        </div>

        <!-- 4. 接续变形测试区域 -->
        <div id="setsuzoku-area" class="hidden">
            <div class="setsuzoku-content-wrap">
                <div class="purple-progress-hint"><span id="setsuzoku-mode-title">接续测试</span>: <span id="setsuzoku-progress">0</span> / <span id="setsuzoku-total">0</span></div>
                <div class="card study-mode-card flex-col-center" id="grammar-card">
                    <div id="display-grammar">---</div>
                    <div id="display-cat-hint" class="translation-display" style="margin-bottom:0;">正在考察词性：-</div>
                </div>
                <!-- 选项区域大小已完全固定，升级为整齐的三列网格 -->
                <div class="options-grid" id="optionsPanel"></div>
                <button id="peek-answer-btn" class="btn-base btn-peek-ans flex-row-center hidden" onclick="peekStudyAnswer()">查看答案</button>
            </div>
            <!-- 底部按钮区域永远固定在最下方 -->
            <div class="setsuzoku-bottom-btns">
                <div id="setsuzoku-nav-row" class="action-row-btns" style="margin-top: 0;">
                    <button class="btn-base btn-prev flex-row-center" onclick="prevSetsuzokuCard()">上一条</button>
                    <button class="btn-base btn-next flex-row-center" onclick="nextSetsuzokuCard()">下一条</button>
                </div>
                <button class="btn-base btn-back-menu-small flex-row-center" onclick="switchView('mode-area')">返回菜单</button>
            </div>
        </div>

        <!-- 5. 结算结果页面 -->
        <div id="result-area" class="hidden">
            <h2 id="result-title" class="result-title-text">通关！</h2>
            <div id="helped-words-container" class="hard-points-wrapper">
                <p class="hard-points-title">难词回顾：</p>
                <div id="help-list">暂无难词</div>
            </div>
            <div class="unified-btn-container">
                <button id="btn-retry-easy" class="btn-base major-hub-btn major-btn-study flex-row-center" onclick="retryExcludingHelped()">重新挑战 (排除难词)</button>
                <button id="btn-focus-hard" class="btn-base major-hub-btn major-btn-write flex-row-center" onclick="focusOnHelped()">巩固难词</button>
                <button id="btn-change-mode" class="btn-base major-hub-btn major-btn-match flex-row-center" onclick="switchView('mode-area')">换个模式</button>
                <button class="btn-base major-hub-btn major-btn-challenge flex-row-center" onclick="location.reload()">重新选择文件</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const BASE_STRUCTURE = {
        "動詞": ["普通", "連体", "原形", "+(い)", "+て", "+ている", "+(え)ば/れば", "+た", "+(あ)", "+(あ)ない", "+(お)う/よう", "+(え)る/られる", "+(あ)せる/させる", "+(あ)れる/られる"],
        "形容詞": ["普通", "連体", "原形", "+くない", "+くて", "+かった", "+ければ", "+く"],
        "形容動詞": ["普通", "連体", "原形", "+である", "+だ", "+な", "+では", "+ではない", "+で", "+だった"],
        "名詞": ["普通", "連体", "原形", "+の", "+である"],
        "句": ["普通"]
    };
    const INTERVALS = [3, 8, 11];
    const TARGET_TILE_COUNT = 18;
    const SEP_LINE = "🧩🧩🧩🧩🧩"; 
    let globalCustomPool = {
        "動詞": new Set(), "形容詞": new Set(), "形容動詞": new Set(), "名詞": new Set(), "句": new Set()
    };
    let rawText = "";
    let sentenceGrammarList = []; 
    let setsuzokuQuizBank = [];   
    let quizQueue = [];           
    let currentQueueIdx = 0;
    let activeAnswers = [];
    let userFoundCount = 0;
    let currentIndex = 0;         
    let currentMode = '';         
    let helpedSet = new Set();    

    const numInput = document.getElementById('numFileInput');
    
    document.addEventListener('click', (e) => {
        const key = e.target.closest('.num-key');
        if(!key) return;
        const val = key.dataset.val;
        if(val === 'clear') numInput.value = '';
        else if(val === 'del') numInput.value = numInput.value.slice(0,-1);
        else numInput.value += val;
    });

    document.getElementById('fetchBunpoTxtBtn').addEventListener('click', async () => {
        const num = numInput.value.trim();
        if(!num){ alert("请输入文件编号！"); return; }
        const txtUrl = `./BunpoTxt/${num}.txt`;
        try{
            const res = await fetch(txtUrl);
            if(!res.ok) throw new Error("文件不存在");
            rawText = await res.text();
            parseAllGrammarData(rawText);
        }catch(err){
            alert(`加载失败：${err.message}\n确认仓库BunpoTxt文件夹存在 ${num}.txt`);
        }
    })
    
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawText = event.target.result;
            parseAllGrammarData(rawText);
        };
        reader.readAsText(file);
    });

    function parseAllGrammarData(text) {
        sentenceGrammarList = [];
        setsuzokuQuizBank = [];
        Object.keys(globalCustomPool).forEach(k => globalCustomPool[k].clear());
        const blockParts = text.split(SEP_LINE);
        const sentenceBlock = blockParts[0] || "";
        const setsuzokuBlock = blockParts[1] || "";
        
        const sentenceLines = sentenceBlock.split(/\r?\n/).filter(l => l.trim() !== "" && l.includes(','));
        sentenceLines.forEach(line => {
            line = line.trim();
            const parts = line.split(',');
            sentenceGrammarList.push({
                fullSentence: parts[0].trim(),
                translation: parts[1].trim(),
                hint: parts[2].trim(),
                answer: parts[3].trim()
            });
        });
        
        const setsuLines = setsuzokuBlock.split(/\r?\n/).filter(l => l.trim() !== "" && l.includes(','));
        setsuLines.forEach(line => {
            line = line.trim();
            const parts = line.split(',');
            const coreGrammar = parts[0];
            let categories = [];
            for (let i = 1; i < parts.length; i++) {
                const catBlock = parts[i].split('_');
                if (catBlock.length >= 2) {
                    const catName = catBlock[0];
                    const rawSubs = catBlock.slice(1);
                    let cleanedSubs = [];
                    for(let j=0; j<rawSubs.length; j++){
                        if(rawSubs[j] === "+" && j+1 < rawSubs.length){
                            cleanedSubs.push("+" + rawSubs[j+1]); j++;
                        } else {
                            if (rawSubs[j].startsWith('+') || rawSubs[j] === "") {
                                cleanedSubs.push(rawSubs[j]);
                            } else {
                                if (cleanedSubs.length > 0 && cleanedSubs[cleanedSubs.length - 1] === "+") {
                                    cleanedSubs[cleanedSubs.length - 1] = "+" + rawSubs[j];
                                } else { cleanedSubs.push(rawSubs[j]); }
                            }
                        }
                    }
                    cleanedSubs = cleanedSubs.filter(s => s !== "").map(s => {
                        if (s === "の") return "+の";
                        if (s === "+(あ)+ない") return "+(あ)ない";
                        return s;
                    });
                    if (cleanedSubs.length > 0) {
                        categories.push({ name: catName, subs: cleanedSubs });
                        if (globalCustomPool[catName]) {
                            cleanedSubs.forEach(sub => globalCustomPool[catName].add(sub));
                        }
                    }
                }
            }
            if (categories.length > 0) {
                setsuzokuQuizBank.push({ core: coreGrammar, categories: categories });
            }
        });
        if(sentenceGrammarList.length === 0 && setsuzokuQuizBank.length ===0){
            alert("txt无有效文法数据，请检查分隔符与每行逗号格式！");
            return;
        }
        document.getElementById('sentence-count').innerText = sentenceGrammarList.length;
        document.getElementById('setsuzoku-count').innerText = setsuzokuQuizBank.length;
        switchView('mode-area');
    }

    window.startMode = function(mode, customBank = null) {
        currentMode = mode;
        currentIndex = 0;
        currentQueueIdx = 0;
        if (!customBank) helpedSet.clear();
        
        if(mode === 'sentence-study' || mode === 'sentence-challenge'){
            const targetList = customBank || sentenceGrammarList;
            if(targetList.length ===0){ alert("当前无填空文法数据！"); return; }
            
            document.getElementById('sentence-hint-btn').classList.toggle('hidden', mode === 'sentence-study');
            document.getElementById('sentence-nav-row').classList.toggle('hidden', mode === 'sentence-challenge');
            document.getElementById('sentence-total').innerText = targetList.length;
            switchView('sentence-area');
            renderSentenceCard();
        }
        if(mode === 'setsuzoku-study' || mode === 'setsuzoku-challenge'){
            const baseBank = customBank || setsuzokuQuizBank;
            if(baseBank.length ===0){ alert("当前无接续文法数据！"); return; }
            quizQueue = [];
            baseBank.forEach(item => {
                item.categories.forEach(cat => {
                    quizQueue.push({
                        core: item.core,
                        category: { name: cat.name, subs: [...cat.subs] },
                        isHardPoint: false
                    });
                });
            });
            document.getElementById('setsuzoku-mode-title').innerText = mode === 'setsuzoku-study' ? "接续学习" : "接续测试";
            document.getElementById('setsuzoku-total').innerText = quizQueue.length;
            
            const peekBtn = document.getElementById('peek-answer-btn');
            const navRow = document.getElementById('setsuzoku-nav-row');
            const gridPanel = document.getElementById('optionsPanel');
            
            if(mode === 'setsuzoku-study'){
                peekBtn.classList.add('hidden');
                navRow.classList.remove('hidden'); 
                gridPanel.style.height = "252px";  
                gridPanel.style.minHeight = "252px";
                gridPanel.style.maxHeight = "252px";
            }else{
                peekBtn.classList.remove('hidden');
                navRow.classList.add('hidden');    
                gridPanel.style.height = "252px";  
                gridPanel.style.minHeight = "252px";
                gridPanel.style.maxHeight = "252px";
            }
            switchView('setsuzoku-area');
            renderSetsuzokuStep();
        }
    };

    function generateScrambledTiles(correctAnswer) {
        let chars = correctAnswer.split('');
        if (chars.length < TARGET_TILE_COUNT && sentenceGrammarList.length > 0) {
            let pool = sentenceGrammarList.map(g => g.answer).join('').split('');
            if (pool.length === 0) pool = "するないたてますればから。".split('');
            while (chars.length < TARGET_TILE_COUNT && pool.length > 0) {
                const randIndex = Math.floor(Math.random() * pool.length);
                chars.push(pool.splice(randIndex, 1)[0]);
            }
        }
        shuffleArray(chars);
        return chars;
    }
    
    function initSentenceScrambleZone(answer) {
        const zone = document.getElementById('sentence-scramble-zone');
        zone.innerHTML = '';
        const tiles = generateScrambledTiles(answer);
        tiles.forEach(char => {
            const btn = document.createElement('div');
            btn.className = 'char-tile';
            btn.innerText = char;
            btn.onclick = () => {
                const input = document.getElementById('sentenceAnswerInput');
                const currentLength = input.value.length;
                if (answer[currentLength] === char) {
                    input.value += char;
                    btn.classList.add('correct-hidden');
                    if (input.value.trim() === answer.trim()) {
                        checkSentenceAnswer();
                    }
                } else {
                    input.value += char;
                    btn.classList.add('used');
                }
            };
            zone.appendChild(btn);
        });
    }

    window.resetSentenceInput = function() {
        const input = document.getElementById('sentenceAnswerInput');
        input.value = "";
        const zone = document.getElementById('sentence-scramble-zone');
        zone.querySelectorAll('.char-tile').forEach(t => {
            t.classList.remove('used', 'correct-hidden');
        });
    };
    
    function renderSentenceCard() {
        const g = sentenceGrammarList[currentIndex];
        const input = document.getElementById('sentenceAnswerInput');
        document.getElementById('sentence-progress').innerText = currentIndex + 1;
        input.value = "";
        
        if (currentMode === 'sentence-study') {
            input.placeholder = g.answer;
        } else {
            input.placeholder = (g.hint && g.hint.trim() !== "") ? `(${g.hint.trim()})` : "...";
        }
        
        let displaySentence = g.fullSentence.replace(g.answer, `⚪️⚪️⚪️`);
        let cardHtml = `<div class="sentence-display">${displaySentence}</div>`;
        cardHtml += `<div class="translation-display" style="margin-top: 8px; margin-bottom: 0;">${g.translation}</div>`;
        
        document.getElementById('sentence-card-content').innerHTML = cardHtml;
        initSentenceScrambleZone(g.answer);
    }
    
    window.checkSentenceAnswer = function() {
        const userVal = document.getElementById('sentenceAnswerInput').value.trim();
        const targetVal = sentenceGrammarList[currentIndex].answer.trim();
        if (userVal === targetVal) {
            setTimeout(()=>{
                if(currentMode === 'sentence-study') nextSentenceCard();
                else { currentIndex++; renderSentenceCard(); }
            }, 200);
        }
    };
    
    window.nextSentenceCard = () => {
        if(currentIndex < sentenceGrammarList.length - 1) {
            currentIndex++;
            renderSentenceCard();
        } else { finishSession("句子填空练习完成！"); }
    };
    window.prevSentenceCard = () => {
        if(currentIndex > 0) {
            currentIndex--;
            renderSentenceCard();
        }
    };
    
    window.showSentenceAnswer = function() {
        const g = sentenceGrammarList[currentIndex];
        helpedSet.add(g.answer);
        const input = document.getElementById('sentenceAnswerInput');
        input.value = g.answer; 
        requeueSentenceItem(g);
    };
    
    function requeueSentenceItem(itemObj) {
        const baseA = itemObj.answer;
        sentenceGrammarList = sentenceGrammarList.filter((item, idx) => idx <= currentIndex || item.answer !== baseA);
        const remainingCount = sentenceGrammarList.length - (currentIndex + 1);
        INTERVALS.forEach(gap => {
            let actualGap = gap;
            if (actualGap > remainingCount) actualGap = remainingCount;
            const targetPos = currentIndex + 1 + actualGap;
            sentenceGrammarList.splice(targetPos, 0, { ...itemObj });
        });
        document.getElementById('sentence-total').innerText = sentenceGrammarList.length;
    }

    function renderSetsuzokuStep() {
        if (currentQueueIdx >= quizQueue.length) { finishSession("接续变形练习完成！"); return; }
        const currentItem = quizQueue[currentQueueIdx];
        document.getElementById('setsuzoku-progress').innerText = currentQueueIdx + 1;
        
        document.getElementById('display-grammar').innerText = (currentItem.isHardPoint ? "[复习] " : "") + currentItem.core;
        document.getElementById('display-cat-hint').innerText = `正在考察词性：${currentItem.category.name}`;
        
        activeAnswers = currentItem.category.subs;
        userFoundCount = 0;
        generateOptionButtons(currentItem.category.name);
    }
    
    function generateOptionButtons(catName) {
        const panel = document.getElementById('optionsPanel');
        panel.innerHTML = "";
        const baseList = BASE_STRUCTURE[catName] || ["普通"];
        const customList = Array.from(globalCustomPool[catName] || []);
        let mixedPool = Array.from(new Set([...baseList, ...customList, ...activeAnswers]));
        mixedPool.forEach(optName => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = optName;
            if (currentMode === 'setsuzoku-study' && activeAnswers.includes(optName)) {
                btn.classList.add('study-hint');
            }
            btn.onclick = function() {
                if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
                if (activeAnswers.includes(optName)) {
                    btn.classList.remove('study-hint');
                    btn.classList.add('correct');
                    userFoundCount++;
                    if (userFoundCount === activeAnswers.length) {
                        setTimeout(nextSetsuzokuCard, 300);
                    }
                } else {
                    btn.classList.add('wrong');
                    if (currentMode === 'setsuzoku-challenge') triggerHardPointExtract();
                }
            };
            panel.appendChild(btn);
        });
        panel.scrollTop = 0;
    }
    
    window.peekStudyAnswer = function() {
        const panel = document.getElementById('optionsPanel');
        const btns = panel.getElementsByClassName('opt-btn');
        for (let btn of btns) {
            if (activeAnswers.includes(btn.innerText) && !btn.classList.contains('correct')) {
                btn.classList.add('study-hint');
            }
        }
        triggerHardPointExtract();
    };
    
    function triggerHardPointExtract() {
        const currentItem = quizQueue[currentQueueIdx];
        const uniqueKey = `${currentItem.core}_${currentItem.category.name}`;
        if (helpedSet.has(uniqueKey)) return;
        helpedSet.add(uniqueKey);
        const remainingCount = quizQueue.length - (currentQueueIdx + 1);
        INTERVALS.forEach(gap => {
            let actualGap = gap;
            if (actualGap > remainingCount) actualGap = remainingCount;
            const targetPos = currentQueueIdx + 1 + actualGap;
            quizQueue.splice(targetPos, 0, {
                core: currentItem.core,
                category: { name: catName, subs: [...currentItem.category.subs] },
                isHardPoint: true
            });
        });
        document.getElementById('setsuzoku-total').innerText = quizQueue.length;
    }
    
    window.nextSetsuzokuCard = function() {
        if (currentQueueIdx < quizQueue.length - 1) {
            currentQueueIdx++;
            renderSetsuzokuStep();
        } else { finishSession("接续变形练习完成！"); }
    };

    window.prevSetsuzokuCard = function() {
        if (currentQueueIdx > 0) {
            currentQueueIdx--;
            renderSetsuzokuStep();
        }
    };

    function finishSession(title) {
        switchView('result-area');
        document.getElementById('result-title').innerText = title;
        const listDiv = document.getElementById('help-list');
        const helpedWrapper = document.getElementById('helped-words-container');
        
        if (helpedSet.size > 0) {
            helpedWrapper.classList.remove('hidden');
            let formatted = Array.from(helpedSet).map(k=>{
                if(k.includes('_')){
                    const [core,cat] = k.split('_');
                    return `${core}(${cat})`;
                }else return k;
            });
            listDiv.innerText = formatted.join('、 ');
        } else {
            helpedWrapper.classList.add('hidden');
            listDiv.innerText = "暂无难词";
        }
        document.body.classList.add('game-over');
    }
    
    window.retryExcludingHelped = function() {
        if(helpedSet.size === 0) { alert("当前无难词需要排除，将为您直接重新挑战！"); startMode(currentMode); return; }
        if(currentMode.startsWith('sentence')){
            const filtered = sentenceGrammarList.filter(g => !helpedSet.has(g.answer));
            if(filtered.length ===0) return alert("过滤后无剩余文法");
            startMode(currentMode, filtered);
        }else{
            const filtered = setsuzokuQuizBank.filter(item => {
                return !item.categories.some(cat => helpedSet.has(`${item.core}_${cat.name}`));
            });
            if(filtered.length ===0) return alert("过滤后无剩余文法");
            startMode(currentMode, filtered);
        }
    };
    
    window.focusOnHelped = function() {
        if(helpedSet.size === 0) { alert("当前无错题难词，无法进行巩固复习！"); return; }
        if(currentMode.startsWith('sentence')){
            const filtered = sentenceGrammarList.filter(g => helpedSet.has(g.answer));
            if(filtered.length ===0) return alert("无对应难点");
            startMode(currentMode, filtered);
        }else{
            const filtered = [];
            setsuzokuQuizBank.forEach(item => {
                let matchCats = item.categories.filter(cat => helpedSet.has(`${item.core}_${cat.name}`));
                if(matchCats.length>0) filtered.push({core:item.core,categories:matchCats});
            });
            if(filtered.length ===0) return alert("无对应难点");
            startMode(currentMode, filtered);
        }
    };
    
    window.switchView = function(id) {
        ['setup-area','mode-area','sentence-area','setsuzoku-area','result-area'].forEach(v=>{
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
        
        if (id === 'setup-area') {
            document.getElementById('main-container').classList.add('setup-scaled');
        } else {
            document.getElementById('main-container').classList.remove('setup-scaled');
        }

        const isGame = ['sentence-area', 'setsuzoku-area'].includes(id);
        document.body.classList[isGame || id === 'result-area' ? 'add' : 'remove']('in-game-mode');
        if (!isGame) document.body.classList.remove('game-over');
        
        document.querySelector('.inner-wrap').scrollTop = 0;
    };
    
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
})();
</script>
</body>
