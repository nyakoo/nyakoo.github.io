<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N2日语单词助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>">

    <style>
        /* ==========================================================================
           [全局样式表 - 核心 CSS 变量声明区 (位置：<style> 头部)]
           ========================================================================== */
        :root {
            /* 1. Main 纯色主题系统变量 */
            --main-pink: #ffccd5;          /* [全局] 主粉色：按钮/渐变/背景 */
            --main-yellow: #fff4d4;        /* [全局] 主黄色：按钮/高亮/消除背景 */
            --main-green: #d8f3dc;         /* [全局] 主绿色：渐变过渡 */
            --main-blue: #bce3f7;          /* [全局] 主蓝色：按钮/在线加载 */
            --main-purple: #e2d1f9;        /* [全局] 主紫色：功能键/拼字底色/边框底色 */

            /* 2. 基础边框与文字主色变量 */
            --border-purple: #7d6b91;      /* [容器/按钮/卡片] 2px实线、虚线边框与下沉阴影色 */
            --text-darkpurple: #4a3e56;    /* [全局] 标题、正文、按键文本、反馈提示的主字体颜色 */
            
            /* 3. 容器与背景色彩变量 */
            --inner-purple: #ecd5fa;       /* [主容器] .inner-wrap 内层容器背景色 */
            --bg-lightpurple: #d1dcff;     /* [页面外层] body 棋盘格基础背景色 */
            --ingame-bg-grey: #eaeaef;     /* [运行状态] 游戏运行中 body 的纯色背景 */
            --ingame-inner-grey: #d5d4e6;  /* [运行状态] 游戏运行中主容器的替换纯色背景 */
            
            /* 4. 半透明/高光辅助色彩变量 */
            --container-shadow-mask: rgba(93, 77, 112, 0.25); /* [主容器] 底部立体阴影色 */
            --inner-scrollbar-track: rgba(0,0,0,0.1);          /* [主容器] 滚动条滑块背景 */
            --setup-box-bg: rgba(255,255,255,0.4);            /* [首页输入框] 外框半透明背景 */
            --spelling-box-bg: rgba(255,255,255,0.6);         /* [测试区] 拼字/假名输入框半透明背景 */
            --text-glow-color: #fff;            /* [标题] 1px 文字白色发光阴影色 */
            --pure-white: #fff;                 /* [卡片/输入框/方块] 纯白色背景 */
            
            /* 5. 其它功能辅助色彩变量 */
            --btn-gray: #e2e2e2;                /* [控制按钮] 通用灰色返回/控制按钮背景 */
            --warn-color: #e67e22;              /* [警示] 难词回顾提示橘黄色、回答错误警示色 */
            --match-def-bg: #f7f0ff;            /* [连线消除] 中文释义卡片默认藕荷色背景 */
            
            /* 6. 高级公用布局与尺寸变量 */
            --text-glow: 1px 1px 0px var(--text-glow-color); 
            --card-padding: 25px 15px;
            --target-display-size: 2.2em;
        }
        
        /* ==========================================================================
           [全局通用盒模型与基础重置 (位置：<style>)]
           ========================================================================== */
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        /* [页面主体] body 框架与动态切换背景 (位置：全屏外层) */
        body {
            margin: 0; padding: 20px 15px; min-height: 100vh; background-color: var(--bg-lightpurple);
            background-image:
                linear-gradient(45deg, var(--main-purple) 25%, transparent 25%, transparent 75%, var(--main-purple) 75%, var(--main-purple)),
                linear-gradient(45deg, var(--main-purple) 25%, transparent 25%, transparent 75%, var(--main-purple) 75%, var(--main-purple));
            background-size: 120px 120px; background-position: 0 0, 60px 60px;
            font-family: 'Segoe UI', "Microsoft YaHei", monospace;
            transition: background 0.3s ease;
            display: flex; justify-content: center; align-items: center;
        }
        body.in-game-mode:not(.game-over) { background-image: none !important; background-color: var(--ingame-bg-grey) !important; }
        body.in-game-mode:not(.game-over) #word-game-container,
        body.in-game-mode:not(.game-over) .inner-wrap { background: var(--ingame-inner-grey) !important; }
        
        /* ==========================================================================
           [核心主容器与布局样式类 (位置：页面中心框架)]
           ========================================================================== */
        /* [主卡片外壳容器] #word-game-container */
        #word-game-container {
            width: 100%; max-width: 500px; min-height: 540px; text-align: center;
            max-height: calc(100vh - 40px);
            background: linear-gradient(135deg, var(--main-pink), var(--main-yellow), var(--main-green), var(--main-blue), var(--main-purple), var(--main-pink));
            border: 2px solid var(--border-purple); border-radius: 40px; padding: 16px;
            box-shadow: 0 12px var(--border-purple) var(--container-shadow-mask);
            transition: zoom 0.15s ease, background 0.3s ease;
            display: flex; flex-direction: column;
        }
        #word-game-container.setup-scaled { zoom: 0.8; }
        
        /* [内层视图容器] .inner-wrap */
        .inner-wrap { 
            background-color: var(--inner-purple); border-radius: 28px; padding: var(--card-padding); 
            width: 100%; min-height: 490px; flex: 1; transition: background 0.3s ease; 
            display: flex; flex-direction: column; justify-content: center; 
            overflow-y: auto; scrollbar-width: none;
        }
        .inner-wrap::-webkit-scrollbar { width: 4px; }
        .inner-wrap::-webkit-scrollbar-thumb { background: var(--inner-scrollbar-track); border-radius: 10px; }
        
        /* [全局排版/隐藏控制] 标题、结算标题与隐藏辅助类 */
        h3, #result-area h2 { color: var(--text-darkpurple); margin: 0; font-size: 24px; text-shadow: var(--text-glow); text-align: center; width: 100%; }
        .hidden { display: none !important; }
        
        /* ==========================================================================
           [首页板块样式 (位置：#setup-area)]
           ========================================================================== */
        /* [首页文件导入容器] .setup-box (包含垂直居中对齐) */
        .setup-box { 
            border: 2px dashed var(--border-purple); padding: 25px 20px; border-radius: 20px; 
            background: var(--setup-box-bg); width: 100%; gap: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* [首页本地导入分割线与标题] (包含垂直居中对齐) */
        .setup-local-divider { 
            border-top: 2px dashed var(--border-purple); padding-top: 15px; width: 100%; gap: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .setup-local-title { width: 100%; }
        
        /* ==========================================================================
           [提示与装饰元素样式 (位置：通用模板与小部件)]
           ========================================================================== */
        /* [图标] 心形 SVG 图标 */
        .icon-heart { display: inline-block; width: 18px; height: 18px; vertical-align: middle; margin-right: 6px; background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>"); background-size: contain; background-repeat: no-repeat; }
        
        /* [提示文字] 深紫色提示文字 (包含水平居中对齐) */
        .theme-hint-text { 
            color: var(--border-purple); font-size: 0.85em; font-weight: bold; text-align: center; width: 100%; margin: 0; 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        
        /* [图标] 小号提示桃心 */
        .hint-icon-small { width: 14px; height: 14px; }
        
        /* ==========================================================================
           [按钮母本与派生体系 (位置：全全局按钮组件)]
           ========================================================================== */
        /* [母本类] 基础交互按钮 .btn-base */
        .btn-base { 
            padding: 12px 16px; 
            color: var(--text-darkpurple); 
            border: 2px solid var(--border-purple); 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 0px var(--border-purple); 
            position: relative; 
            top: 0; 
            margin: 0; 
            outline: none; 
            gap: 8px; 
            transition: all 0.05s ease; 
        }
        .btn-base:active { top: 4px; box-shadow: 0 0px 0px var(--border-purple); }
        
        /* [派生按钮] 首页本地文件选择大标签 (包含水平居中对齐) */
        .import-local-label { 
            width: 100%; 
            background-color: var(--main-yellow); 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        
        /* [派生按钮] 首页在线加载大按钮 (包含水平居中对齐) */
        .load-txt-btn { 
            background-color: var(--main-blue); 
            width: 100%; 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        
        /* [按钮组容器] 统一垂直排布组容器 */
        .unified-btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; }
        
        /* [派生按钮] 主菜单与结算核心大按钮 (包含水平居中对齐) */
        .major-hub-btn { 
            width: 85%; 
            max-width: 300px; 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        /* 主菜单不同模式特化配色 */
        .major-btn-study { background-color: var(--main-pink); }
        .major-btn-challenge { background-color: var(--main-blue); }
        .major-btn-write { background-color: var(--main-purple); }
        .major-btn-match { background-color: var(--main-yellow); }
        /* 结算视图特化配色 */
        .major-btn-retry { background-color: var(--main-yellow); }
        .major-btn-focus { background-color: var(--main-purple); }
        .major-btn-mode { background-color: var(--main-blue); }
        .major-btn-reload { background-color: var(--main-pink); }
        
        /* [派生按钮] 通用灰色操作/返回按钮 (包含水平居中对齐) */
        .action-btn-gray { 
            background: var(--btn-gray); 
            width: 100%; 
            font-size: 14px; 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        
        /* [派生按钮] “提示我”专属样式覆盖 */
        .show-answer-btn-override { 
            color: var(--text-darkpurple); 
        }
        
        /* [派生按钮] 学习模式上一张/下一张双排按钮布局 */
        .study-turn-row { display: flex; gap: 10px; width: 100%; }
        .study-turn-btn { flex: 1; display: flex; flex-direction: row; align-items: center; justify-content: center; }
        
        /* [控制区组容器] 底部操作控制区域容器 */
        .action-container-gap { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .action-challenge-container { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: auto; }
        
        /* ==========================================================================
           [学习卡片与拼字/挑战测试区样式 (位置：#study-area, #challenge-area)]
           ========================================================================== */
        /* [卡片母本] 展示单词卡片背景 */
        .card { border: 2px solid var(--border-purple); border-radius: 18px; padding: 20px; background: var(--pure-white); text-align: left; margin: 0; }
        
        /* [卡片标题] 学习模式单词汉字大标题 */
        .card h2 { font-size: var(--target-display-size); font-weight: bold; color: var(--text-darkpurple); margin: 0; text-align: center; word-break: break-all; padding: 0 10px; }
        
        /* [输入框容器] 拼字/假名输入组合框 */
        .spelling-box { padding: 16px 15px; background: var(--spelling-box-bg); border-radius: 16px; width: 100%; display: flex; flex-direction: column; gap: 8px; }
        
        /* [输入框组件] 键盘及假名文本输入框 */
        .num-input-box { width: 100%; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1.2em; font-weight: 575; border: 2px solid var(--border-purple); border-radius: 12px; text-align: center; outline: none; background: var(--pure-white); color: var(--border-purple); }
        
        /* [显示文本] 假名挑战与测试核心题目大字 */
        #display-word { font-size: var(--target-display-size); font-weight: bold; color: var(--text-darkpurple); word-break: break-all; text-align: center; width: 100%; padding: 0 10px; }
        
        /* [反馈文本] 输入与连线正误反馈提示文字 */
        .feedback-text { height: 20px; font-weight: bold; font-size: 0.9em; text-align: center; margin: 0; }
        
        /* [难词回顾] 结算页面难词展示面板 */
        .helped-words-box { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .helped-words-box p { font-weight: bold; color: var(--warn-color); text-align: center; margin: 0; }
        
        /* [难词列表] 结算页面难词滚动容器 (包含垂直居中对齐) */
        #help-list { 
            background: transparent !important; border: none !important; box-shadow: none !important; 
            max-height: 220px; overflow-y: auto; color: var(--text-darkpurple); width: 100%; 
            display: flex; flex-direction: column; gap: 6px; align-items: center; justify-content: center;
        }
        .hard-word-item { font-size: 0.95em; word-break: break-all; text-align: center; margin: 0; }
        .progress-text { color: var(--border-purple); font-size: 0.85em; font-weight: bold; text-align: center; width: 100%; margin: 0; }
        
        /* [假名拼字方块] 九宫格网图及假名可点击方块 */
        .scramble-container { 
            display: grid; 
            grid-template-columns: repeat(8, auto); 
            gap: 6px; 
            min-height: 130px; 
            width: 100%; 
            justify-content: center; 
            margin: 6px 0 0 0; 
        }
        .char-tile { background: var(--pure-white); border: 2px solid var(--border-purple); color: var(--border-purple); border-radius: 12px; width: 42px; height: 42px; line-height: 38px; font-size: 1.2em; font-weight: 575; cursor: pointer; user-select: none; text-align: center; transition: all 0.15s; }
        .char-tile:active { border-width: 1px; transform: scale(1.05); background: var(--main-purple); }
        .char-tile.used { opacity: 0.4; background: var(--ingame-bg-grey); pointer-events: none; }
        .char-tile.correct-hidden { visibility: hidden; pointer-events: none; }
        
        /* ==========================================================================
           [连线消除模式专属样式 (位置：#match-area)]
           ========================================================================== */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        /* [连线卡片] 连线消除双向卡片 (包含水平居中对齐) */
        .match-card { 
            border-radius: 16px; padding: 15px 10px; font-size: 1.1em; font-weight: bold; 
            cursor: pointer; min-height: 75px; word-break: break-all; border: 2px solid currentColor; 
            position: relative; top: 0; transition: all 0.05s ease; margin: 0; 
            display: flex; flex-direction: row; align-items: center; justify-content: center;
        }
        .match-card:active { top: 4px; }
        .match-card.lang-word { background-color: var(--main-purple); color: var(--text-darkpurple); opacity: 0.8; }
        .match-card.lang-def { background-color: var(--match-def-bg); color: var(--text-darkpurple); }
        .match-card.selected { background-color: var(--main-yellow) !important; color: var(--text-darkpurple); transform: scale(1.02); opacity: 1; }
        .match-card.invisible { visibility: hidden !important; pointer-events: none !important; }
        
        /* ==========================================================================
           [数字软键盘小部件样式 (位置：#dynamic-numpad-container)]
           ========================================================================== */
        #numFileInput { text-align: center; font-size: 18px; letter-spacing: 4px; max-width: 200px; margin: 0 auto; display: block; }
        .numpad-wrap { width: 100%; display: flex; flex-direction: column; gap: 6px; }
        
        /* [数字键盘行容器] (包含水平居中对齐) */
        .numpad-row { gap: 6px; display: flex; flex-direction: row; align-items: center; justify-content: center; }
        
        /* [数字键/功能键按键] */
        .num-key { width: 60px; height: 60px; font-size: 22px; padding: 0; margin: 0; background: var(--pure-white); color: var(--text-darkpurple); border: 2px solid var(--border-purple); border-radius: 12px; box-shadow: none; }
        .num-key:active { border-width: 1px; transform: scale(1.05); }
        .num-key.func { background: var(--main-purple); }

        /* ==========================================================================
           [页面五大核心板块布局结构配置 (位置：各板块顶层容器)]
           ========================================================================== */
        /* [首页文件加载区布局] (包含垂直居中对齐) */
        #setup-area { gap: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        /* [模式选择区布局] (包含垂直居中对齐) */
        #mode-area { gap: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        /* [学习模式区布局] */
        #study-area { display: flex; flex-direction: column; gap: 15px; }
        /* [假名/书写挑战区布局] */
        #challenge-area { display: flex; flex-direction: column; gap: 15px; height: 100%; flex: 1; }
        /* [连线消除区布局] */
        #match-area { display: flex; flex-direction: column; gap: 15px; }
        /* [通关结算区布局] (包含垂直居中对齐) */
        #result-area { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ==========================================================================
           [移动端响应式适配 (位置：<style> 尾部)]
           ========================================================================== */
        @media (max-width: 480px) {
            #word-game-container { padding: 10px; } 
            .inner-wrap { padding: 15px 10px; }
            .char-tile { width: 36px; height: 36px; line-height: 32px; font-size: 1.05em; border-radius: 9px; }
            .match-card { font-size: 0.95em; padding: 12px 4px; min-height: 70px; } 
            .num-key { width: 50px; height: 50px; font-size: 18px; }
.scramble-container { grid-template-columns: repeat(6, auto) !important; }
        }
    </style>
</head>
<body>

<!-- ==========================================================================
     [模板母本区 (HTML Templates) - 用于 JS 引擎动态渲染组件]
     ========================================================================== -->

<!-- [母本 1] 全局提示信息模板 -->
<template id="tpl-hint-text">
    <p class="theme-hint-text">
        <span class="icon-heart hint-icon-small"></span>
        <span class="hint-content"></span>
    </p>
</template>

<!-- [母本 2] 单词学习卡片模板 -->
<template id="tpl-word-card">
    <div class="word-card-root">
        <h2></h2>
        <div class="card-info">
            <p class="info-kana" style="margin: 8px 0; border-bottom: 1px solid var(--main-purple); padding-bottom: 5px; font-size: 1.1em; color: var(--text-darkpurple);">读音：<span></span></p>
            <p class="info-accent" style="margin: 8px 0; border-bottom: 1px solid var(--main-purple); padding-bottom: 5px; font-size: 1.1em; color: var(--text-darkpurple);">声调：<span></span></p>
            <p class="info-definition" style="margin: 0; border-bottom: none; padding-bottom: 0; font-size: 1.1em; color: var(--text-darkpurple);">释义：<span></span></p>
        </div>
    </div>
</template>

<!-- [母本 3] 数字键盘行容器模板 -->
<template id="tpl-numpad-row">
    <div class="numpad-row"></div>
</template>

<!-- [母本 4] 通用灰色控制/返回按钮模板 -->
<template id="tpl-action-btn">
    <button class="btn-base action-btn-gray"></button>
</template>

<!-- [母本 5] 通用模式选择与结算功能大按钮模板 -->
<template id="tpl-major-hub-btn">
    <button class="btn-base major-hub-btn"></button>
</template>


<!-- ==========================================================================
     [页面主体应用容器 (#word-game-container)]
     ========================================================================== -->
<div id="word-game-container" class="setup-scaled">
    <div class="inner-wrap">

        <!-- ------------------------------------------------------------------
             [板块 1] 首页 txt 文件的数字加载与本地上传视图
             ------------------------------------------------------------------ -->
        <div id="setup-area">
            <h3>N2日语单词助手</h3>
            <div class="setup-box">
                <!-- 动态解析提示头 -->
                <div data-hint="输入数字(1-38)提取 WordTxt/[].txt"></div>
                <!-- 文件编号输入框 -->
                <div class="num-input-box"><input type="text" id="numFileInput" readonly placeholder="..."></div>
                
                <!-- 动态挂载数字软键盘容器 -->
                <div class="numpad-wrap" id="dynamic-numpad-container"></div>
                
                <!-- 加载在线文本按钮 -->
                <button class="btn-base load-txt-btn" id="fetchWordTxtBtn">加载在线文本</button>
                
                <!-- 本地文件分割上传区 -->
                <div class="setup-local-divider">
                    <div data-hint="你也可以手动上传txt" class="setup-local-title"></div>
                    <label for="fileInput" class="btn-base import-local-label">汇入本地文件</label>
                    <input type="file" id="fileInput" accept=".txt" class="hidden">
                </div>
            </div>
        </div>

        <!-- ------------------------------------------------------------------
             [板块 2] 主功能模式选择菜单视图
             ------------------------------------------------------------------ -->
        <div id="mode-area" class="hidden">
            <h3>已加载 <span id="total-count">0</span> 个单词</h3>
            <div class="unified-btn-container">
                <!-- 声明式大按钮：动态挂载组件引擎自动化解析渲染 -->
                <div data-major-btn data-text="学习模式" data-class-suffix="study" data-onclick="startMode('study')"></div>
                <div data-major-btn data-text="假名挑战" data-class-suffix="challenge" data-onclick="startMode('challenge')"></div>
                <div data-major-btn data-text="书写测试" data-class-suffix="write" data-onclick="startMode('hard-test')"></div>
                <div data-major-btn data-text="连线消除" data-class-suffix="match" data-onclick="startMode('match')"></div>
            </div>
        </div>

        <!-- ------------------------------------------------------------------
             [板块 3] 单词卡片学习视图
             ------------------------------------------------------------------ -->
        <div id="study-area" class="hidden">
            <div class="progress-text">学习进度: <span id="study-progress">0</span> / <span id="study-total">0</span></div>
            <!-- 卡片渲染挂载点 -->
            <div class="card" id="card-content"></div>
            <!-- 假名/罗马音拼写拼图检测区 -->
            <div class="spelling-box">
                <div data-hint="输入假名/罗马音"></div>
                <input type="text" id="studyAnswerInput" placeholder="..." autocomplete="off">
                <div id="study-feedback" class="feedback-text"></div>
            </div>
            <!-- 翻页控制与返回菜单操作按钮区 -->
            <div class="action-container-gap">
                <div class="study-turn-row">
                    <button class="btn-base study-turn-btn" onclick="prevCard()">上一张</button>
                    <button class="btn-base study-turn-btn" onclick="nextCard()">下一张</button>
                </div>
                <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')"></div>
            </div>
        </div>

        <!-- ------------------------------------------------------------------
             [板块 4] 假名挑战与书写测试视图
             ------------------------------------------------------------------ -->
        <div id="challenge-area" class="hidden">
            <div class="progress-text">当前进度: <span id="challenge-progress">0</span> / <span id="challenge-total">0</span></div>
            <!-- 题目核心字符展示区 -->
            <div id="display-word">---</div>
            <!-- 点击“提示我”后弹出的悬浮提示卡片 -->
            <div id="answer-hint-card" class="card hidden"></div>

            <div class="spelling-box">
                <!-- 1. 书写测试模式：点击九宫格假名拼字测试区 -->
                <div id="scramble-test-zone" style="gap: 8px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div data-hint="依顺序点击下方方块"></div>
                    <input type="text" id="scrambleAnswerInput" placeholder="..." readonly autocomplete="off">
                    <div id="hard-scramble-container" class="scramble-container"></div>
                </div>
                <!-- 2. 假名挑战模式：直接键盘输入假名测试区 -->
                <div id="typing-test-zone" class="hidden" style="gap: 8px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div data-hint="输入假名/罗马音"></div>
                    <input type="text" id="challengeAnswerInput" placeholder="..." autocomplete="off">
                </div>
                <div id="challenge-feedback" class="feedback-text"></div>
            </div>
            
            <div class="action-challenge-container">
                <div id="show-answer-btn" data-action-btn="提示我" data-onclick="showHelpAnswer()" class="show-answer-btn-override"></div>
                <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')"></div>
            </div>
        </div>

        <!-- ------------------------------------------------------------------
             [板块 5] 连线消除交互视图
             ------------------------------------------------------------------ -->
        <div id="match-area" class="hidden">
            <div class="progress-text">已消除单词: <span id="match-cleared-progress">0</span> / <span id="match-game-total">0</span></div>
            <div data-hint="中日语可任意顺序双向连线"></div>
            <!-- 消除卡片网格容器 -->
            <div class="match-grid" id="match-grid-container"></div>
            <div id="match-feedback" class="feedback-text"></div>
            <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')"></div>
        </div>

        <!-- ------------------------------------------------------------------
             [板块 6] 通关结算与难词回顾视图
             ------------------------------------------------------------------ -->
        <div id="result-area" class="hidden">
            <h2>恭喜通关！</h2>
            <!-- 难词回顾弹窗面板 -->
            <div id="helped-words-container" class="hidden helped-words-box">
                <p>难词回顾</p>
                <div id="help-list"></div>
            </div>
            <!-- 结算功能选择按钮组 -->
            <div class="unified-btn-container" style="margin-top: 15px;">
                <div data-major-btn data-text="再来一遍" data-class-suffix="retry" data-onclick="retryExcludingHelped()"></div>
                <div data-major-btn data-text="巩固难词" data-class-suffix="focus" data-onclick="focusOnHelped()"></div>
                <div data-major-btn data-text="换个模式" data-class-suffix="mode" data-onclick="switchView('mode-area')"></div>
                <div data-major-btn data-text="重选文件" data-class-suffix="reload" data-onclick="location.reload()"></div>
            </div>
        </div>

    </div>
</div>

<!-- ==========================================================================
     [核心 JavaScript 业务逻辑处理引擎]
     ========================================================================== -->
<script>
(function() {
    /* ==========================================================================
       [JavaScript 全局状态管理变量]
       ========================================================================== */
    let originalWordList = [];     // 存放解析后的原始单词全集数组
    let challengeQueue = [];       // 当前测试/挑战模式下的运行动态队列
    let currentIndex = 0;          // 当前测试/学习的索引位置
    let currentMode = '';          // 当前运行的模式名称（study, challenge, hard-test, match）
    let helpedKanjiSet = new Set();// 记录玩家使用了“提示我”或者答错的难词集合
    let matchFirstSelectedCard = null; // 连线消除模式中，保存首次点击选中的卡片对象
    
    // 答错/请求提示时，错词将在后续出现的间隔步数数组
    const WRONG_WORD_REAPPEAR_GAPS = [3, 8, 11]; 

    /* ==========================================================================
       [罗马音 (Romaji) -> 日语假名 (Kana) 映射字典]
       ========================================================================== */
    const romajiMap = {
        'a':'あ','i':'い','u':'う','e':'え','o':'お',
        'ka':'か','ki':'き','ku':'く','ke':'け','ko':'こ',
        'sa':'さ','shi':'し','su':'す','se':'せ','so':'そ',
        'ta':'た','chi':'ち','tu':'つ','te':'て','to':'と',
        'na':'な','ni':'に','nu':'ぬ','ne':'ね','no':'の',
        'ha':'は','hi':'ひ','hu':'ふ','he':'へ','ho':'ほ',
        'ma':'ま','mi':'み','mu':'む','me':'め','mo':'モ',
        'ya':'や','yu':'よ','yo':'よ',
        'ra':'ら','ri':'り','ru':'る','re':'れ','ro':'ろ',
        'wa':'わ','wo':'を','nn':'ん',
        'ga':'が','gi':'ぎ','gu':'ぐ','ge':'げ','go':'ご',
        'za':'ざ','ji':'じ','zu':'ず','ze':'ぜ','zo':'ぞ',
        'da':'だ','di':'ぢ','du':'づ','de':'で','do':'ど',
        'ba':'ば','bi':'び','bu':'ぶ','be':'べ','bo':'ぼ',
        'pa':'ぱ','pi':'ぴ','pu':'ぷ','pe':'ぺ','po':'ぽ',
        'kya':'きゃ','kyu':'きゅ','kyo':'きょ',
        'sha':'しゃ','shu':'しゅ','sho':'しょ',
        'cha':'ちゃ','chu':'ちゅ','cho':'ちょ',
        'nya':'にゃ','nyu':'にゅ','nyo':'にょ',
        'hya':'ひゃ','hyu':'ひゅ','hyo':'ひょ',
        'mya':'みゃ','myu':'みゃ','myo':'みょ',
        'rya':'りゃ','ryu':'りゅ','ryo':'りょ',
        'gya':'ぎゃ','gyu':'ぎゅ','gyo':'ぎょ',
        'jya':'じゃ','jyu':'じゅ','jyo':'じょ',
        'bya':'びゃ','byu':'びゅ','byo':'びょ',
        'pya':'ぴゃ','pyu':'ぴゅ','pya':'ぴょ',
        'rye':'りぇ','ddi':'でぃ','fa':'ふぁ'
    };

    /* ==========================================================================
       [DOM 渲染引擎：将声明式 HTML 标签动态解析挂载为真实 DOM 节点]
       ========================================================================== */
    // 1. 解析挂载首页数字软键盘 (#dynamic-numpad-container)
    const numpadContainer = document.getElementById('dynamic-numpad-container');
    if(numpadContainer) {
        const layout = [
            [{v:'1'}, {v:'2'}, {v:'3'}],
            [{v:'4'}, {v:'5'}, {v:'6'}],
            [{v:'7'}, {v:'8'}, {v:'9'}],
            [{v:'clear', t:'AC', f:true}, {v:'0'}, {v:'del', t:'←', f:true}]
        ];
        const rowTemplate = document.getElementById('tpl-numpad-row');
        layout.forEach(rowData => {
            const rowClone = rowTemplate.content.cloneNode(true);
            const rowDiv = rowClone.querySelector('.numpad-row');
            rowData.forEach(btnInfo => {
                const btn = document.createElement('button');
                btn.className = `num-key${btnInfo.f ? ' func' : ''}`;
                btn.dataset.val = btnInfo.v;
                btn.innerText = btnInfo.t || btnInfo.v;
                rowDiv.appendChild(btn);
            });
            numpadContainer.appendChild(rowClone);
        });
    }

    // 2. 解析 [data-hint] 挂载带有心形图标的深紫提示文字
    document.querySelectorAll('[data-hint]').forEach(container => {
        const template = document.getElementById('tpl-hint-text');
        const clone = template.content.cloneNode(true);
        clone.querySelector('.hint-content').innerText = container.dataset.hint;
        container.replaceWith(clone);
    });

    // 3. 解析 [data-action-btn] 挂载控制/返回型按钮
    document.querySelectorAll('[data-action-btn]').forEach(container => {
        const template = document.getElementById('tpl-action-btn');
        const clone = template.content.cloneNode(true);
        const btn = clone.querySelector('button');
        btn.innerText = container.dataset.actionBtn;
        if(container.id) btn.id = container.id;
        if(container.dataset.onclick) btn.setAttribute('onclick', container.dataset.onclick);
        if(container.className) {
            btn.classList.add(...container.className.split(' '));
        }
        container.replaceWith(clone);
    });

    // 4. 解析 [data-major-btn] 挂载主要模式与结算大按钮
    document.querySelectorAll('[data-major-btn]').forEach(container => {
        const template = document.getElementById('tpl-major-hub-btn');
        const clone = template.content.cloneNode(true);
        const btn = clone.querySelector('button');
        btn.innerText = container.dataset.text || "";
        if(container.dataset.classSuffix) {
            btn.classList.add(`major-btn-${container.dataset.classSuffix}`);
        }
        if(container.dataset.onclick) {
            btn.setAttribute('onclick', container.dataset.onclick);
        }
        container.replaceWith(clone);
    });

    // 5. 渲染单词卡片模板函数 (应用于学习模式卡片及答案提示卡片)
    function renderWordCardTemplate(targetElement, data) {
        const template = document.getElementById('tpl-word-card');
        const clone = template.content.cloneNode(true);
        clone.querySelector('h2').innerText = data.kanji;
        clone.querySelector('.info-kana span').innerText = data.kana;
        clone.querySelector('.info-accent span').innerText = data.accent;
        clone.querySelector('.info-definition span').innerText = data.definition;
        targetElement.innerHTML = '';
        targetElement.appendChild(clone);
    }

    /* ==========================================================================
       [通用辅助工具函数]
       ========================================================================== */
    // 隐藏/显示节点快捷切换
    const toggleHidden = (id, isHidden) => document.getElementById(id)?.classList[isHidden ? 'add' : 'remove']('hidden');
    
    // 设置反馈提示区域文字与色彩
    const setFeedback = (id, text, color = "") => {
        const el = document.getElementById(id);
        if(el) { el.innerText = text; el.style.color = color; }
    };
    
    // 获取当前处于测试/挑战队列中的单词对象
    const currWord = () => challengeQueue[currentIndex];

    // 洗牌算法（随机打乱数组）
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 罗马音转平假名函数
    function romajiToKana(text) {
        text = text.toLowerCase();
        let result = "", i = 0;
        while (i < text.length) {
            let matched = false;
            for (let len = 4; len >= 1; len--) {
                let substring = text.substr(i, len);
                if (romajiMap[substring]) { result += romajiMap[substring]; i += len; matched = true; break; }
            }
            if (!matched) {
                if (text[i] === text[i+1] && text[i] >= 'a' && text[i] <= 'z' && text[i] !== 'n') { result += "っ"; i += 1; }
                else { result += text[i]; i += 1; }
            }
        }
        return result;
    }

    // 过滤清除多余字符，只保留日语假名与汉字
    function cleanString(str) { return str ? str.replace(/[^\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FA5]/g, '').toLowerCase() : ""; }

    /* ==========================================================================
       [首页交互逻辑：文件读取与软键盘事件处理]
       ========================================================================== */
    const numInput = document.getElementById('numFileInput');
    
    // 软键盘按钮点击事件监听
    document.addEventListener('click', (e) => {
        const key = e.target.closest('.num-key');
        if(!key) return;
        const act = key.dataset.val;
        if(act === 'clear') numInput.value = '';
        else if(act === 'del') numInput.value = numInput.value.slice(0, -1);
        else numInput.value += act;
    });

    // 请求在线 WordTxt/[].txt 文件
    document.getElementById('fetchWordTxtBtn').addEventListener('click', async () => {
        const num = numInput.value.trim();
        if(!num) return alert("请先输入文件编号！");
        try {
            const res = await fetch(`./WordTxt/${num}.txt`);
            if(!res.ok) throw new Error("云端文件不存在");
            parseTxtData(await res.text());
        } catch(err) { alert(`加载失败：${err.message}`); }
    });

    // 监听本地文件选择并上传
    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (ev) => parseTxtData(ev.target.result);
        reader.readAsText(e.target.files[0]);
    });

    // 解析 txt 格式文本为 JSON 数组
    function parseTxtData(rawText) {
        originalWordList = rawText.split(/\r?\n/).filter(l => l.includes(',')).map(line => {
            const p = line.split(',').map(s => s.trim());
            let def = p.slice(3).filter(x => x).join('、').replace(/[^\u4e00-\u9fa5\u3001\uff0c\uff08\uff09\u2014]/g, '').trim();
            def = def.replace(/、{2,}/g, '、').replace(/^、|、$/g, '').trim();
            return { id: Math.random().toString(36).substr(2, 9), kanji: p[0], kana: p[1], accent: p[2] || '0', definition: def || p.slice(3).join('、') };
        });
        if(originalWordList.length > 0) {
            document.getElementById('total-count').innerText = originalWordList.length;
            switchView('mode-area');
        } else { alert("txt内无有效单词数据"); }
    }

    /* ==========================================================================
       [模式启动与核心流程控制器]
       ========================================================================== */
    window.startMode = function(mode, customList = null) {
        currentMode = mode; currentIndex = 0;
        if (!customList) helpedKanjiSet.clear(); 
        const targetList = customList || originalWordList;

        if (mode === 'challenge' || mode === 'hard-test') {
            challengeQueue = targetList.map(w => ({ ...w }));
            switchView('challenge-area'); renderChallenge();
        } else if (mode === 'match') {
            challengeQueue = [...targetList]; shuffleArray(challengeQueue);
            document.getElementById('match-game-total').innerText = targetList.length;
            document.getElementById('match-cleared-progress').innerText = 0;
            switchView('match-area'); nextMatchRound();
        } else {
            switchView('study-area'); renderStudy();
        }
    };

    /* ==========================================================================
       [学习模式业务逻辑 (#study-area)]
       ========================================================================== */
    function renderStudy() {
        const cur = originalWordList[currentIndex];
        document.getElementById('study-progress').innerText = currentIndex + 1;
        document.getElementById('study-total').innerText = originalWordList.length;
        setFeedback('study-feedback', "");
        document.getElementById('studyAnswerInput').value = "";
        renderWordCardTemplate(document.getElementById('card-content'), cur);
    }

    // 监听学习模式输入框拼写
    document.getElementById('studyAnswerInput').addEventListener('input', function() {
        if (cleanString(romajiToKana(this.value.trim())) === cleanString(originalWordList[currentIndex].kana)) {
            setFeedback('study-feedback', "正确！", "var(--border-purple)");
            setTimeout(nextCard, 200);
        }
    });

    window.nextCard = () => { currentIndex < originalWordList.length - 1 ? (currentIndex++, renderStudy()) : finishSession(); };
    window.prevCard = () => { if(currentIndex > 0) { currentIndex--; renderStudy(); } };

    /* ==========================================================================
       [假名挑战与书写测试业务逻辑 (#challenge-area)]
       ========================================================================== */
    // 初始化书写测试模式下的九宫格假名拼字卡片
    function initHardScrambleZone(answer) {
        const grid = document.getElementById('hard-scramble-container');
        const input = document.getElementById('scrambleAnswerInput');
        grid.innerHTML = ''; input.value = '';
        
        let chars = answer.split('');
        const maxT = window.innerWidth >= 550 ? 24 : 18;
        if (chars.length < maxT && originalWordList.length > 0) {
            let pool = originalWordList.map(w => w.kanji + w.kana).join('').split('');
            while (chars.length < maxT && pool.length > 0) chars.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
        }
        shuffleArray(chars);

        chars.slice(0, maxT).forEach(char => {
            const tile = document.createElement('div');
            tile.className = 'char-tile'; tile.innerText = char;
            tile.onclick = () => {
                let len = input.value.length;
                if (answer[len] === char) {
                    input.value += char; tile.classList.add('correct-hidden');
                    if (input.value.trim() === answer.trim()) {
                        setFeedback('challenge-feedback', "正确！", "var(--border-purple)");
                        currentIndex++; setTimeout(renderChallenge, 220);
                    }
                } else {
                    input.value += char; tile.classList.add('used');
                    setFeedback('challenge-feedback', "回答错误", "var(--warn-color)");
                }
            };
            grid.appendChild(tile);
        });
        input.onclick = () => {
            input.value = ""; setFeedback('challenge-feedback', "");
            grid.querySelectorAll('.char-tile').forEach(t => t.classList.remove('used', 'correct-hidden'));
        };
    }

    // 渲染挑战/测试视图
    function renderChallenge() {
        if (currentIndex >= challengeQueue.length) { finishSession(); return; }
        const cur = currWord(), display = document.getElementById('display-word');
        setFeedback('challenge-feedback', "");
        toggleHidden('answer-hint-card', true);
        
        const isHard = currentMode === 'hard-test';
        display.innerText = isHard ? cur.definition : cur.kanji;
        
        toggleHidden('scramble-test-zone', !isHard);
        toggleHidden('typing-test-zone', isHard);
        
        if (isHard) initHardScrambleZone(cur.kanji);
        else document.getElementById('challengeAnswerInput').value = "";

        document.getElementById('challenge-progress').innerText = currentIndex + 1;
        document.getElementById('challenge-total').innerText = challengeQueue.length;
    }

    // 监听挑战模式下的键盘输入
    document.getElementById('challengeAnswerInput').addEventListener('input', function() {
        if (cleanString(romajiToKana(this.value.trim())) === cleanString(currWord().kana)) {
            setFeedback('challenge-feedback', "正确！", "var(--border-purple)");
            currentIndex++; setTimeout(renderChallenge, 220);
        }
    });

    // 点击“提示我”展开答案并加入重练逻辑
    window.showHelpAnswer = function() {
        const cur = currWord();
        helpedKanjiSet.add(cur.kanji);
        const hint = document.getElementById('answer-hint-card');
        renderWordCardTemplate(hint, cur);
        toggleHidden('answer-hint-card', false);
        
        challengeQueue = challengeQueue.filter((item, idx) => idx <= currentIndex || item.kanji !== cur.kanji);
        const rem = challengeQueue.length - (currentIndex + 1);
        WRONG_WORD_REAPPEAR_GAPS.forEach(gap => {
            challengeQueue.splice(currentIndex + 1 + (gap > rem ? rem : gap), 0, { ...cur });
        });
        document.getElementById('challenge-total').innerText = challengeQueue.length;
    };

    /* ==========================================================================
       [连线消除业务逻辑 (#match-area)]
       ========================================================================== */
    function nextMatchRound() {
        matchFirstSelectedCard = null; setFeedback('match-feedback', "");
        if (challengeQueue.length === 0) return finishSession();

        let curWords = challengeQueue.splice(0, 4), pool = [];
        curWords.forEach(w => {
            pool.push({ id: w.id, text: w.kanji, type: 'word', raw: w }, { id: w.id, text: w.definition, type: 'def', raw: w });
        });
        shuffleArray(pool);

        const container = document.getElementById('match-grid-container');
        container.innerHTML = "";
        for (let i = 0; i < 8; i++) {
            if(pool[i]) {
                const card = document.createElement('div');
                card.className = `match-card lang-${pool[i].type}`; card.innerText = pool[i].text;
                card.dataset.id = pool[i].id; card.dataset.type = pool[i].type; card.customData = pool[i].raw;
                card.addEventListener('click', () => handleMatchCardClick(card));
                container.appendChild(card);
            } else {
                const p = document.createElement('div'); p.className = 'match-card invisible'; container.appendChild(p);
            }
        }
    }

    // 处理连线卡片点击判定
    function handleMatchCardClick(card) {
        if (!matchFirstSelectedCard) { matchFirstSelectedCard = card; card.classList.add('selected'); return; }
        if (matchFirstSelectedCard === card) { card.classList.remove('selected'); matchFirstSelectedCard = null; return; }
        if (matchFirstSelectedCard.dataset.type === card.dataset.type) { matchFirstSelectedCard.classList.remove('selected'); matchFirstSelectedCard = card; card.classList.add('selected'); return; }
        
        if (matchFirstSelectedCard.dataset.id === card.dataset.id) {
            setFeedback('match-feedback', "正确！", "var(--border-purple)");
            matchFirstSelectedCard.className = card.className = 'match-card invisible';
            matchFirstSelectedCard = null;
            
            let span = document.getElementById('match-cleared-progress');
            span.innerText = parseInt(span.innerText) + 1;
            if (document.querySelectorAll('#match-grid-container .match-card:not(.invisible)').length === 0) setTimeout(nextMatchRound, 300);
        } else {
            setFeedback('match-feedback', "错啦，再试试！", "var(--warn-color)");
            if(card.customData) helpedKanjiSet.add(card.customData.kanji);
            matchFirstSelectedCard.classList.remove('selected'); matchFirstSelectedCard = null;
        }
    }

    /* ==========================================================================
       [通关结算与界面视图切换路由]
       ========================================================================== */
    function finishSession() {
        switchView('result-area');
        const listDiv = document.getElementById('help-list');
        if (helpedKanjiSet.size > 0) {
            toggleHidden('helped-words-container', false);
            listDiv.innerHTML = Array.from(helpedKanjiSet).map(k => {
                const w = originalWordList.find(item => item.kanji === k);
                return w ? `<div class="hard-word-item">${w.kanji}(${w.kana}) — <span>${w.definition}</span></div>` : '';
            }).join('');
        } else { toggleHidden('helped-words-container', true); }
        document.body.classList.add('game-over');
    }

    // 重新开始当前模式
    window.retryExcludingHelped = () => { originalWordList.length ? startMode(currentMode, originalWordList) : alert("无单词可用"); };
    
    // 专门巩固记录到的难词
    window.focusOnHelped = () => {
        const f = originalWordList.filter(w => helpedKanjiSet.has(w.kanji));
        f.length ? startMode(currentMode, f) : alert("当前没有记录到难词");
    };

    // [视图切换路由器] 隐藏非目标视图，激活目标视图
    window.switchView = function(viewId) {
        ['setup-area', 'mode-area', 'study-area', 'challenge-area', 'match-area', 'result-area'].forEach(id => toggleHidden(id, true));
        toggleHidden(viewId, false);
        document.getElementById('word-game-container').classList[viewId === 'setup-area' ? 'add' : 'remove']('setup-scaled');

        const isGame = ['study-area', 'challenge-area', 'match-area'].includes(viewId);
        document.body.classList[isGame || viewId === 'result-area' ? 'add' : 'remove']('in-game-mode');
        if (!isGame) document.body.classList.remove('game-over');
        
        document.querySelector('.inner-wrap').scrollTop = 0;
    }
})();
</script>
</body>
</html>
