<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N2日语单词助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>">

    <style>
        :root {
            /* 主题核心变量 */
            --theme-border-color: #7d6b91; 
            --theme-text-color: #4a3e56; 
            
            --inner-bg: #ecd5fa; 
            --btn-pink: #ffccd5; 
            --btn-blue: #bce3f7; 
            --btn-yellow: #fff4d4; 
            --success-color: #4a3e56; 
            --warn-color: #e67e22; 
            --error-color: #e74c3c; 
            --selected-color: #e2d1f9cc; 
            --local-file-bg: #fff4d4;
            --text-glow: 1px 1px 0px #fff; 
            --card-padding: 25px 15px;

            /* 合并唯一变量：统一的学习/测试/释义展示字号 */
            --target-display-size: 2.2em;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        /* 通用Flex轴向居中工具 */
        .flex-col-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .flex-row-center { display: flex; flex-direction: row; align-items: center; justify-content: center; }
        
        body {
            margin: 0; padding: 20px 15px; min-height: 100vh; background-color: #d1dcff;
            background-image:
                linear-gradient(45deg, #e2d1f9 25%, transparent 25%, transparent 75%, #e2d1f9 75%, #e2d1f9),
                linear-gradient(45deg, #e2d1f9 25%, transparent 25%, transparent 75%, #e2d1f9 75%, #e2d1f9);
            background-size: 120px 120px; background-position: 0 0, 60px 60px;
            font-family: 'Segoe UI', "Microsoft YaHei", monospace;
            transition: background 0.3s ease;
            display: flex; justify-content: center; align-items: center;
        }
        body.in-game-mode:not(.game-over) { background-image: none !important; background-color: #eaeaef !important; }
        body.in-game-mode:not(.game-over) #word-game-container,
        body.in-game-mode:not(.game-over) .inner-wrap { background: #d5d4e6 !important; }
        
        #word-game-container {
            width: 100%; max-width: 500px; min-height: 540px; text-align: center;
            max-height: calc(100vh - 40px);
            background: linear-gradient(135deg, #ffccd5, #fff4d4, #d8f3dc, #bce3f7, #e2d1f9, #ffccd5);
            border: 2px solid var(--theme-border-color); border-radius: 40px; padding: 16px;
            box-shadow: 0 12px var(--theme-border-color) rgba(93, 77, 112, 0.25);
            transition: zoom 0.15s ease, background 0.3s ease;
            display: flex; flex-direction: column;
        }
        #word-game-container.setup-scaled { zoom: 0.8; }
        
        .inner-wrap { 
            background-color: var(--inner-bg); border-radius: 28px; padding: var(--card-padding); 
            width: 100%; min-height: 490px; flex: 1; transition: background 0.3s ease; 
            display: flex; flex-direction: column; justify-content: center; 
            overflow-y: auto; scrollbar-width: none;
        }
        .inner-wrap::-webkit-scrollbar { width: 4px; }
        .inner-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        h3, #result-area h2 { color: var(--theme-text-color); margin: 0 0 20px 0; font-size: 24px; text-shadow: var(--text-glow); text-align: center; width: 100%; }
        .hidden { display: none !important; }
        
        .setup-box { border: 2px dashed var(--theme-border-color); padding: 25px 20px; border-radius: 20px; background: rgba(255,255,255,0.4); width: 100%; }
        .icon-heart { display: inline-block; width: 18px; height: 18px; vertical-align: middle; margin-right: 6px; background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M12 4.419C12.433 3.473 13.9 1 18.5 1 23.5 1 26 5.344 26 8.5c0 6-7.5 12-14 17.5-6.5-5.5-14-11.5-14-17.5C-2 5.344.5 1 5.5 1c4.6 0 6.067 2.473 6.5 3.419z' transform='scale(3.5) translate(3, 2)' fill='%23ff9ebb'/></svg>"); background-size: contain; background-repeat: no-repeat; }
        
        /* 全局深紫小字提醒样式类 */
        .theme-hint-text {
            color: var(--theme-text-color);
            font-size: 0.85em;
            font-weight: bold;
            text-align: center;
            width: 100%;
            margin: 0 0 12px 0;
        }
        
        button { padding: 12px 16px; color: var(--theme-text-color); border: 2px solid var(--theme-border-color); border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0px var(--theme-border-color); position: relative; top: 0; margin: 5px; outline: none; gap: 8px; transition: all 0.05s ease; }
        button:active { top: 4px; box-shadow: 0 0px 0px var(--theme-border-color); }
        .load-txt-btn { background-color: var(--btn-blue); width: 100%; margin: 12px 0 0 0; }
        
        .mode-btn-container { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; width: 100%; align-items: center; }
        .mode-btn-container button { width: 85%; max-width: 300px; margin: 0; }
        .mode-btn-container button:nth-child(1) { background: var(--btn-pink); }
        .mode-btn-container button:nth-child(2) { background: var(--btn-blue); }
        .mode-btn-container button:nth-child(3) { background: #e2d1f9; }
        .mode-btn-container button:nth-child(4) { background: var(--btn-yellow); }
        .btn-gray { background: #e2e2e2 !important; }
        
        .card { border: 2px solid var(--theme-border-color); border-radius: 18px; padding: 20px; margin: 15px 0; background: #fff; text-align: left; }
        
        /* 学习模式下的原文大字标题规范：完全同步目标字号 */
        .card h2 { 
            font-size: var(--target-display-size); 
            font-weight: bold;
            color: var(--theme-text-color); 
            margin: 0; 
            text-align: center; 
            word-break: break-all;
            padding: 0 10px;
        }
        .card-info p { margin: 8px 0; border-bottom: 1px solid #e2d1f9; padding-bottom: 5px; font-size: 1.1em; color: var(--theme-text-color); }
        .spelling-box { margin: 10px 0 15px 0; padding: 16px 15px; background: rgba(255,255,255,0.6); border-radius: 16px; width: 100%; }
        
        input[type="text"] { width: 100%; padding: 12px; font-size: 1.2em; font-weight: 575; border: 2px solid var(--theme-border-color); border-radius: 12px; text-align: center; outline: none; background: #fff; color: var(--theme-border-color); }
        
        /* 假名挑战原文 与 书写测试释义 核心文字显示规范：完全同步目标字号 */
        #display-word { 
            font-size: var(--target-display-size); 
            font-weight: bold; 
            margin: 15px 0; 
            color: var(--theme-text-color); 
            word-break: break-all; 
            text-align: center; 
            width: 100%; 
            padding: 0 10px;
        }
        
        .feedback-text { height: 20px; font-weight: bold; margin-top: 10px; font-size: 0.9em; text-align: center; }
        
        #help-list { background: transparent !important; border: none !important; box-shadow: none !important; max-height: 220px; overflow-y: auto; color: var(--theme-text-color); width: 100%; }
        .hard-word-item { margin: 4px 0; font-size: 0.95em; word-break: break-all; text-align: center; }
        .btn-group-vertical { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; width: 100%; align-items: center; }
        .progress-text { color: var(--theme-border-color); font-size: 0.85em; margin-bottom: 5px; font-weight: bold; text-align: center; width: 100%; }
        
        .scramble-container { display: grid; grid-template-rows: repeat(3, auto); grid-auto-flow: column; grid-auto-columns: minmax(0, 1fr); gap: 6px; margin: 12px 0; min-height: 130px; width: 100%; justify-content: center; }
        .char-tile { background: #ffffff; border: 2px solid var(--theme-border-color); color: var(--theme-border-color); border-radius: 12px; width: 42px; height: 42px; line-height: 38px; font-size: 1.2em; font-weight: 575; cursor: pointer; user-select: none; text-align: center; transition: all 0.15s; }
        .char-tile:active { border-width: 1px; transform: scale(1.05); background: #e2d1f9; }
        .char-tile.used { opacity: 0.4; background: #d1dcff; pointer-events: none; }
        .char-tile.correct-hidden { visibility: hidden; pointer-events: none; }
        
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; width: 100%; }
        .match-card { border-radius: 16px; padding: 15px 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; min-height: 75px; word-break: break-all; border: 2px solid currentColor; position: relative; top: 0; transition: all 0.05s ease; }
        .match-card:active { top: 4px; }
        .match-card.lang-word { background-color: var(--selected-color); color: var(--theme-text-color); }
        .match-card.lang-def { background-color: #f7f0ff; color: var(--theme-text-color); }
        .match-card.selected { background-color: #fff8e7; color: var(--theme-text-color); transform: scale(1.02); }
        .match-card.invisible { visibility: hidden !important; pointer-events: none !important; }
        
        #numFileInput { text-align: center; font-size: 18px; letter-spacing: 4px; max-width: 200px; margin: 0 auto; display: block; }
        .numpad-wrap { margin-top: 15px; margin-bottom: 12px; width: 100%; }
        .numpad-row { gap: 6px; margin-bottom: 6px; }
        .num-key { width: 60px; height: 60px; font-size: 22px; padding: 0; margin: 0; background: #fff; color: var(--theme-text-color); border: 2px solid var(--theme-border-color); border-radius: 12px; box-shadow: none; }
        .num-key:active { border-width: 1px; transform: scale(1.05); }
        .num-key.func { background: #e2d1f9; }

        @media (max-width: 480px) {
            #word-game-container { padding: 10px; } .inner-wrap { padding: 15px 10px; }
            .char-tile { width: 36px; height: 36px; line-height: 32px; font-size: 1.05em; border-radius: 9px; }
            .match-card { font-size: 0.95em; padding: 12px 4px; min-height: 70px; } .num-key { width: 50px; height: 50px; font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- ==================== 母本声明区域 ==================== -->
<!-- 母本 1：小桃心提示标签组件 -->
<template id="tpl-hint-text">
    <p class="theme-hint-text flex-row-center">
        <span class="icon-heart" style="width:14px; height:14px;"></span>
        <span class="hint-content"></span>
    </p>
</template>

<!-- 母本 2：大字展示 + 释义卡片组件 -->
<template id="tpl-word-card">
    <div class="word-card-root">
        <h2></h2>
        <div class="card-info">
            <p class="info-kana">读音：<span></span></p>
            <p class="info-accent">声调：<span></span></p>
            <p class="info-definition">释义：<span></span></p>
        </div>
    </div>
</template>

<!-- 母本 3：数字键盘行组件 -->
<template id="tpl-numpad-row">
    <div class="numpad-row flex-row-center"></div>
</template>

<!-- 母本 4：通用底部小灰控制按钮组件 -->
<template id="tpl-action-btn">
    <button class="btn-gray flex-row-center" style="width: 100%; margin: 0; font-size: 14px; justify-content: center;"></button>
</template>
<!-- ====================================================== -->

<div id="word-game-container" class="setup-scaled">
    <div class="inner-wrap">
        <!-- 1. 文本导入与上传页面 -->
        <div id="setup-area" class="flex-col-center" style="width:100%">
            <h3>N2日语单词助手</h3>
            <div class="setup-box flex-col-center">
                <div data-hint="输入数字(1-38)提取 WordTxt/[].txt"></div>
                <div class="num-input-box" style="width:100%"><input type="text" id="numFileInput" readonly placeholder="..."></div>
                
                <!-- 动态填充母本 3 的键盘容器 -->
                <div class="numpad-wrap" id="dynamic-numpad-container"></div>
                
                <button class="load-txt-btn flex-row-center" id="fetchWordTxtBtn">加载在线文本</button>
                <div style="margin-top:15px; border-top:2px dashed var(--theme-border-color); padding-top:15px; width:100%;" class="flex-col-center">
                    <div data-hint="你也可以手动上传txt" style="margin-bottom: 5px; width:100%;"></div>
                    <label for="fileInput" class="flex-row-center" style="width: 100%; padding: 12px 16px; background-color: var(--local-file-bg); border: 2px solid var(--theme-border-color); border-radius: 16px; color: var(--theme-text-color); font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0px var(--theme-border-color); position: relative; top: 0; margin: 5px; justify-content: center;">汇入本地文件</label>
                    <input type="file" id="fileInput" accept=".txt" style="display: none;">
                </div>
            </div>
        </div>

        <!-- 2. 主模式选择菜单 -->
        <div id="mode-area" class="hidden flex-col-center" style="width:100%">
            <h3>已加载 <span id="total-count">0</span> 个单词</h3>
            <div class="mode-btn-container">
                <button class="flex-row-center" onclick="startMode('study')" style="justify-content: center;">📖 学习模式</button>
                <button class="flex-row-center" onclick="startMode('challenge')" style="justify-content: center;">🎯 假名挑战</button>
                <button class="flex-row-center" onclick="startMode('hard-test')" style="justify-content: center;">📝 书写测试</button>
                <button class="flex-row-center" onclick="startMode('match')" style="justify-content: center;">🧩 连线消除</button>
            </div>
        </div>

        <!-- 3. 📖 学习模式主界面 -->
        <div id="study-area" class="hidden" style="width:100%">
            <div class="progress-text">学习进度: <span id="study-progress">0</span> / <span id="study-total">0</span></div>
            <div class="card" id="card-content"></div>
            <div class="spelling-box">
                <div data-hint="输入假名/罗马音" style="justify-content: center;"></div>
                <input type="text" id="studyAnswerInput" placeholder="..." autocomplete="off">
                <div id="study-feedback" class="feedback-text"></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="flex-row-center" onclick="prevCard()" style="flex: 1; margin: 0; justify-content: center;">上一张</button>
                    <button class="flex-row-center" onclick="nextCard()" style="flex: 1; margin: 0; justify-content: center;">下一张</button>
                </div>
                <!-- 动态填充母本 4 -->
                <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')"></div>
            </div>
        </div>

        <!-- 4. 🎯 假名挑战 / 📝 书写测试 主界面 -->
        <div id="challenge-area" class="hidden" style="width:100%">
            <div class="progress-text">当前进度: <span id="challenge-progress">0</span> / <span id="challenge-total">0</span></div>
            <div id="display-word">---</div>
            <div id="answer-hint-card" class="card hidden"></div>

            <div class="spelling-box">
                <div id="scramble-test-zone">
                    <div data-hint="依顺序点击下方方块" style="justify-content: center;"></div>
                    <input type="text" id="scrambleAnswerInput" placeholder="..." readonly autocomplete="off">
                    <div id="hard-scramble-container" class="scramble-container"></div>
                </div>
                <div id="typing-test-zone" class="hidden">
                    <div data-hint="输入假名/罗马音" style="justify-content: center;"></div>
                    <input type="text" id="challengeAnswerInput" placeholder="..." autocomplete="off">
                </div>
                <div id="challenge-feedback" class="feedback-text"></div>
            </div>
            <!-- 动态填充母本 4 的功能操控组 -->
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px;">
                <div id="show-answer-btn" data-action-btn="提示我" data-onclick="showHelpAnswer()" data-style="color: var(--theme-text-color);"></div>
                <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')"></div>
            </div>
        </div>

        <!-- 5. 🧩 连线消除 游戏界面 -->
        <div id="match-area" class="hidden" style="width:100%">
            <div class="progress-text">已消除单词: <span id="match-cleared-progress">0</span> / <span id="match-game-total">0</span></div>
            <div data-hint="中日语可任意顺序双向连线" style="margin-bottom: 10px;"></div>
            <div class="match-grid" id="match-grid-container"></div>
            <div id="match-feedback" class="feedback-text"></div>
            <!-- 动态填充母本 4 -->
            <div data-action-btn="返回菜单" data-onclick="switchView('mode-area')" style="margin-top:20px;"></div>
        </div>

        <!-- 6. 🎉 游戏通关结算展示区域 -->
        <div id="result-area" class="hidden flex-col-center" style="width:100%">
            <h2>🧩 恭喜通关！🎉</h2>
            <div id="helped-words-container" class="hidden" style="width:100%">
                <p style="font-weight: bold; color: var(--warn-color); margin-bottom: 5px; text-align: center;">难词回顾</p>
                <div id="help-list" class="flex-col-center" style="margin-bottom: 10px;"></div>
            </div>
            <div class="btn-group-vertical">
                <button class="flex-row-center" onclick="retryExcludingHelped()" style="background-color: var(--btn-yellow); width: 80%; justify-content: center;">再来一遍</button>
                <button class="flex-row-center" onclick="focusOnHelped()" style="background-color: var(--selected-color); width: 80%; justify-content: center;">巩固难词</button>
                <button class="flex-row-center" onclick="switchView('mode-area')" style="background-color: var(--btn-blue); width: 80%; justify-content: center;"><span class="icon-heart"></span>换个模式<span class="icon-heart"></span></button>
                <button class="flex-row-center" onclick="location.reload()" style="background-color: var(--btn-pink); width: 80%; justify-content: center;">重选文件</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    let originalWordList = [], challengeQueue = [], currentIndex = 0, currentMode = '';              
    let helpedKanjiSet = new Set(), matchFirstSelectedCard = null; 
    const WRONG_WORD_REAPPEAR_GAPS = [3, 8, 11]; 

    const romajiMap = {
        'a':'あ','i':'い','u':'う','e':'え','o':'お',
        'ka':'か','ki':'き','ku':'く','ke':'け','ko':'こ',
        'sa':'さ','shi':'し','su':'す','se':'せ','so':'そ',
        'ta':'た','chi':'ち','tu':'つ','te':'て','to':'到',
        'na':'な','ni':'に','nu':'ぬ','ne':'ね','no':'の',
        'ha':'は','hi':'ひ','hu':'ふ','he':'へ','ho':'ほ',
        'ma':'ま','mi':'み','mu':'む','me':'め','mo':'も',
        'ya':'や','yu':'ゆ','yo':'よ',
        'ra':'ら','ri':'り','ru':'る','re':'れ','ro':'ろ',
        'wa':'わ','wo':'を','nn':'ん',
        'ga':'が','gi':'ぎ','gu':'ぐ','ge':'げ','go':'ご',
        'za':'ざ','ji':'じ','zu':'ず','ze':'ぜ','zo':'ぞ',
        'da':'だ','di':'ぢ','du':'づ','de':'で','do':'ど',
        'ba':'ば','bi':'び','bu':'ぶ','be':'べ','bo':'ぼ',
        'pa':'ぱ','pi':'ぴ','pu':'ぷ','pe':'ぺ','po':'ぽ',
        'kya':'きゃ','kyu':'きゅ','kyo':'きょ',
        'sha':'しゃ','shu':'しゅ','sho':'しょ',
        'cha':'ちゃ','chu':'ちゅ','cho':'ちょ',
        'nya':'にゃ','nyu':'にゅ','nyo':'にょ',
        'hya':'ひゃ','hyu':'ひゅ','hyo':'ひょ',
        'mya':'みゃ','myu':'みゅ','myo':'みょ',
        'rya':'りゃ','ryu':'りゅ','ryo':'りょ',
        'gya':'ぎゃ','gyu':'ぎゅ','gyo':'ぎょ',
        'jya':'じゃ','jyu':'じゅ','jyo':'じょ',
        'bya':'びゃ','byu':'びゅ','byo':'びょ',
        'pya':'ぴゃ','pyu':'ぴゅ','pya':'ぴょ',
        'rye':'りぇ','ddi':'でぃ','fa':'ふぁ'
    };

    // ==================== 母本页面声明组件动态解析挂载引擎 ====================
    
    // 1. 动态生成输入小键盘 (母本 3 级联解析)
    const numpadContainer = document.getElementById('dynamic-numpad-container');
    if(numpadContainer) {
        const layout = [
            [{v:'1'}, {v:'2'}, {v:'3'}],
            [{v:'4'}, {v:'5'}, {v:'6'}],
            [{v:'7'}, {v:'8'}, {v:'9'}],
            [{v:'clear', t:'AC', f:true}, {v:'0'}, {v:'del', t:'←', f:true}]
        ];
        const rowTemplate = document.getElementById('tpl-numpad-row');
        layout.forEach(rowData => {
            const rowClone = rowTemplate.content.cloneNode(true);
            const rowDiv = rowClone.querySelector('.numpad-row');
            rowData.forEach(btnInfo => {
                const btn = document.createElement('button');
                btn.className = `num-key${btnInfo.f ? ' func' : ''}`;
                btn.dataset.val = btnInfo.v;
                btn.innerText = btnInfo.t || btnInfo.v;
                rowDiv.appendChild(btn);
            });
            numpadContainer.appendChild(rowClone);
        });
    }

    // 2. 静态锚点解析一：带有 data-hint 的标签转换为母本 1
    document.querySelectorAll('[data-hint]').forEach(container => {
        const template = document.getElementById('tpl-hint-text');
        const clone = template.content.cloneNode(true);
        const pTag = clone.querySelector('p');
        if (container.getAttribute('style')) {
            pTag.setAttribute('style', pTag.getAttribute('style') + ';' + container.getAttribute('style'));
        }
        clone.querySelector('.hint-content').innerText = container.dataset.hint;
        container.replaceWith(clone);
    });

    // 3. 静态锚点解析二：带有 data-action-btn 的标签转换为底部灰色控制按钮组 (母本 4)
    document.querySelectorAll('[data-action-btn]').forEach(container => {
        const template = document.getElementById('tpl-action-btn');
        const clone = template.content.cloneNode(true);
        const btn = clone.querySelector('button');
        
        btn.innerText = container.dataset.action-btn;
        // 迁移原有和附加的事件及样式
        if(container.id) btn.id = container.id;
        if(container.dataset.onclick) btn.setAttribute('onclick', container.dataset.onclick);
        
        let extraStyle = container.getAttribute('style') || "";
        let btnStyle = container.dataset.style || "";
        if(extraStyle || btnStyle) {
            btn.setAttribute('style', btn.getAttribute('style') + ';' + extraStyle + ';' + btnStyle);
        }
        container.replaceWith(clone);
    });

    // 母本 2：大字释义卡片专用高级渲染函数
    function renderWordCardTemplate(targetElement, data) {
        const template = document.getElementById('tpl-word-card');
        const clone = template.content.cloneNode(true);
        
        clone.querySelector('h2').innerText = data.kanji;
        clone.querySelector('.info-kana span').innerText = data.kana;
        clone.querySelector('.info-accent span').innerText = data.accent;
        clone.querySelector('.info-definition span').innerText = data.definition;
        
        targetElement.innerHTML = '';
        targetElement.appendChild(clone);
    }
    // =========================================================================

    const toggleHidden = (id, isHidden) => document.getElementById(id)?.classList[isHidden ? 'add' : 'remove']('hidden');
    const setFeedback = (id, text, color = "") => {
        const el = document.getElementById(id);
        if(el) { el.innerText = text; el.style.color = color; }
    };
    const currWord = () => challengeQueue[currentIndex];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function romajiToKana(text) {
        text = text.toLowerCase();
        let result = "", i = 0;
        while (i < text.length) {
            let matched = false;
            for (let len = 4; len >= 1; len--) {
                let substring = text.substr(i, len);
                if (romajiMap[substring]) { result += romajiMap[substring]; i += len; matched = true; break; }
            }
            if (!matched) {
                if (text[i] === text[i+1] && text[i] >= 'a' && text[i] <= 'z' && text[i] !== 'n') { result += "っ"; i += 1; }
                else { result += text[i]; i += 1; }
            }
        }
        return result;
    }

    function cleanString(str) { return str ? str.replace(/[^\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FA5]/g, '').toLowerCase() : ""; }

    const numInput = document.getElementById('numFileInput');
    document.querySelectorAll('.num-key').forEach(key => {
        key.addEventListener('click', () => {
            const act = key.dataset.val;
            if(act === 'clear') numInput.value = '';
            else if(act === 'del') numInput.value = numInput.value.slice(0, -1);
            else numInput.value += act;
        });
    });

    document.getElementById('fetchWordTxtBtn').addEventListener('click', async () => {
        const num = numInput.value.trim();
        if(!num) return alert("请先输入文件编号！");
        try {
            const res = await fetch(`./WordTxt/${num}.txt`);
            if(!res.ok) throw new Error("云端文件不存在");
            parseTxtData(await res.text());
        } catch(err) { alert(`加载失败：${err.message}`); }
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (ev) => parseTxtData(ev.target.result);
        reader.readAsText(e.target.files[0]);
    });

    function parseTxtData(rawText) {
        originalWordList = rawText.split(/\r?\n/).filter(l => l.includes(',')).map(line => {
            const p = line.split(',').map(s => s.trim());
            let def = p.slice(3).filter(x => x).join('、').replace(/[^\u4e00-\u9fa5\u3001\uff0c\uff08\uff09\u2014]/g, '').trim();
            def = def.replace(/、{2,}/g, '、').replace(/^、|、$/g, '').trim();
            return { id: Math.random().toString(36).substr(2, 9), kanji: p[0], kana: p[1], accent: p[2] || '0', definition: def || p.slice(3).join('、') };
        });
        if(originalWordList.length > 0) {
            document.getElementById('total-count').innerText = originalWordList.length;
            switchView('mode-area');
        } else { alert("txt内无有效单词数据"); }
    }

    window.startMode = function(mode, customList = null) {
        currentMode = mode; currentIndex = 0;
        if (!customList) helpedKanjiSet.clear(); 
        const targetList = customList || originalWordList;

        if (mode === 'challenge' || mode === 'hard-test') {
            challengeQueue = targetList.map(w => ({ ...w }));
            switchView('challenge-area'); renderChallenge();
        } else if (mode === 'match') {
            challengeQueue = [...targetList]; shuffleArray(challengeQueue);
            document.getElementById('match-game-total').innerText = targetList.length;
            document.getElementById('match-cleared-progress').innerText = 0;
            switchView('match-area'); nextMatchRound();
        } else {
            switchView('study-area'); renderStudy();
        }
    };

    function renderStudy() {
        const cur = originalWordList[currentIndex];
        document.getElementById('study-progress').innerText = currentIndex + 1;
        document.getElementById('study-total').innerText = originalWordList.length;
        setFeedback('study-feedback', "");
        document.getElementById('studyAnswerInput').value = "";
        
        renderWordCardTemplate(document.getElementById('card-content'), cur);
    }

    document.getElementById('studyAnswerInput').addEventListener('input', function() {
        if (cleanString(romajiToKana(this.value.trim())) === cleanString(originalWordList[currentIndex].kana)) {
            setFeedback('study-feedback', "正确！", "#46b450");
            setTimeout(nextCard, 200);
        }
    });

    window.nextCard = () => { currentIndex < originalWordList.length - 1 ? (currentIndex++, renderStudy()) : finishSession(); };
    window.prevCard = () => { if(currentIndex > 0) { currentIndex--; renderStudy(); } };

    function initHardScrambleZone(answer) {
        const grid = document.getElementById('hard-scramble-container');
        const input = document.getElementById('scrambleAnswerInput');
        grid.innerHTML = ''; input.value = '';
        
        let chars = answer.split('');
        const maxT = window.innerWidth >= 550 ? 24 : 18;
        if (chars.length < maxT && originalWordList.length > 0) {
            let pool = originalWordList.map(w => w.kanji + w.kana).join('').split('');
            while (chars.length < maxT && pool.length > 0) chars.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
        }
        shuffleArray(chars);

        chars.slice(0, maxT).forEach(char => {
            const tile = document.createElement('div');
            tile.className = 'char-tile'; tile.innerText = char;
            tile.onclick = () => {
                let len = input.value.length;
                if (answer[len] === char) {
                    input.value += char; tile.classList.add('correct-hidden');
                    if (input.value.trim() === answer.trim()) {
                        setFeedback('challenge-feedback', "正确！", "var(--success-color)");
                        currentIndex++; setTimeout(renderChallenge, 220);
                    }
                } else {
                    input.value += char; tile.classList.add('used');
                    setFeedback('challenge-feedback', "回答错误", "var(--error-color)");
                }
            };
            grid.appendChild(tile);
        });
        input.onclick = () => {
            input.value = ""; setFeedback('challenge-feedback', "");
            grid.querySelectorAll('.char-tile').forEach(t => t.classList.remove('used', 'correct-hidden'));
        };
    }

    function renderChallenge() {
        if (currentIndex >= challengeQueue.length) { finishSession(); return; }
        const cur = currWord(), display = document.getElementById('display-word');
        setFeedback('challenge-feedback', "");
        toggleHidden('answer-hint-card', true);
        
        const isHard = currentMode === 'hard-test';
        display.innerText = isHard ? cur.definition : cur.kanji;
        
        toggleHidden('scramble-test-zone', !isHard);
        toggleHidden('typing-test-zone', isHard);
        
        if (isHard) initHardScrambleZone(cur.kanji);
        else document.getElementById('challengeAnswerInput').value = "";

        document.getElementById('challenge-progress').innerText = currentIndex + 1;
        document.getElementById('challenge-total').innerText = challengeQueue.length;
    }

    document.getElementById('challengeAnswerInput').addEventListener('input', function() {
        if (cleanString(romajiToKana(this.value.trim())) === cleanString(currWord().kana)) {
            setFeedback('challenge-feedback', "正确！", "#46b450");
            currentIndex++; setTimeout(renderChallenge, 220);
        }
    });

    window.showHelpAnswer = function() {
        const cur = currWord();
        helpedKanjiSet.add(cur.kanji);
        const hint = document.getElementById('answer-hint-card');
        
        renderWordCardTemplate(hint, cur);
        toggleHidden('answer-hint-card', false);
        
        challengeQueue = challengeQueue.filter((item, idx) => idx <= currentIndex || item.kanji !== cur.kanji);
        const rem = challengeQueue.length - (currentIndex + 1);
        WRONG_WORD_REAPPEAR_GAPS.forEach(gap => {
            challengeQueue.splice(currentIndex + 1 + (gap > rem ? rem : gap), 0, { ...cur });
        });
        document.getElementById('challenge-total').innerText = challengeQueue.length;
    };

    function nextMatchRound() {
        matchFirstSelectedCard = null; setFeedback('match-feedback', "");
        if (challengeQueue.length === 0) return finishSession();

        let curWords = challengeQueue.splice(0, 4), pool = [];
        curWords.forEach(w => {
            pool.push({ id: w.id, text: w.kanji, type: 'word', raw: w }, { id: w.id, text: w.definition, type: 'def', raw: w });
        });
        shuffleArray(pool);

        const container = document.getElementById('match-grid-container');
        container.innerHTML = "";
        for (let i = 0; i < 8; i++) {
            if(pool[i]) {
                const card = document.createElement('div');
                card.className = `match-card flex-row-center lang-${pool[i].type}`; card.innerText = pool[i].text;
                card.dataset.id = pool[i].id; card.dataset.type = pool[i].type; card.customData = pool[i].raw;
                card.style.justifyContent = "center";
                card.addEventListener('click', () => handleMatchCardClick(card));
                container.appendChild(card);
            } else {
                const p = document.createElement('div'); p.className = 'match-card invisible'; container.appendChild(p);
            }
        }
    }

    function handleMatchCardClick(card) {
        if (!matchFirstSelectedCard) { matchFirstSelectedCard = card; card.classList.add('selected'); return; }
        if (matchFirstSelectedCard === card) { card.classList.remove('selected'); matchFirstSelectedCard = null; return; }
        if (matchFirstSelectedCard.dataset.type === card.dataset.type) { matchFirstSelectedCard.classList.remove('selected'); matchFirstSelectedCard = card; card.classList.add('selected'); return; }
        
        if (matchFirstSelectedCard.dataset.id === card.dataset.id) {
            setFeedback('match-feedback', "正确！", "var(--success-color)");
            matchFirstSelectedCard.className = card.className = 'match-card invisible';
            matchFirstSelectedCard = null;
            
            let span = document.getElementById('match-cleared-progress');
            span.innerText = parseInt(span.innerText) + 1;
            if (document.querySelectorAll('#match-grid-container .match-card:not(.invisible)').length === 0) setTimeout(nextMatchRound, 300);
        } else {
            setFeedback('match-feedback', "❌ 错啦，再试试！", "red");
            if(card.customData) helpedKanjiSet.add(card.customData.kanji);
            matchFirstSelectedCard.classList.remove('selected'); matchFirstSelectedCard = null;
        }
    }

    function finishSession() {
        switchView('result-area');
        const listDiv = document.getElementById('help-list');
        if (helpedKanjiSet.size > 0) {
            toggleHidden('helped-words-container', false);
            listDiv.innerHTML = Array.from(helpedKanjiSet).map(k => {
                const w = originalWordList.find(item => item.kanji === k);
                return w ? `<div class="hard-word-item">${w.kanji}(${w.kana}) — <span>${w.definition}</span></div>` : '';
            }).join('');
        } else { toggleHidden('helped-words-container', true); }
        document.body.classList.add('game-over');
    }

    window.retryExcludingHelped = () => { originalWordList.length ? startMode(currentMode, originalWordList) : alert("无单词可用"); };
    window.focusOnHelped = () => {
        const f = originalWordList.filter(w => helpedKanjiSet.has(w.kanji));
        f.length ? startMode(currentMode, f) : alert("当前没有记录到难词");
    };

    window.switchView = function(viewId) {
        ['setup-area', 'mode-area', 'study-area', 'challenge-area', 'match-area', 'result-area'].forEach(id => toggleHidden(id, true));
        toggleHidden(viewId, false);
        document.getElementById('word-game-container').classList[viewId === 'setup-area' ? 'add' : 'remove']('setup-scaled');

        const isGame = ['study-area', 'challenge-area', 'match-area'].includes(viewId);
        document.body.classList[isGame || viewId === 'result-area' ? 'add' : 'remove']('in-game-mode');
        if (!isGame) document.body.classList.remove('game-over');
        
        document.querySelector('.inner-wrap').scrollTop = 0;
    }
})();
</script>
</body>
